      <!-- Pinstripes -->
      <rect width="529.13" height="2.27" fill="#1A1A2E" opacity="0.2"/>
      <rect y="92.22" width="529.13" height="2.27" fill="#1A1A2E" opacity="0.2"/>
      <!-- Line 1: SIGNAALBEWAKING.NL -->
      <text x="264.57" y="27" font-family="Montserrat, sans-serif" font-weight="800" font-size="17" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">SIGNAALBEWAKING.NL</text>
      <!-- Line 2: UW PARTNER -->
