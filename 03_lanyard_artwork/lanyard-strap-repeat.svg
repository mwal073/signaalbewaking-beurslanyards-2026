<?xml version="1.0" encoding="UTF-8"?>
<!-- SignaalBewaking Lanyard Strap — Single Repeat Unit -->
<!-- Size: 140mm x 25mm (1 repeat @ 14cm interval) -->
<!-- Base: Signaal Rood #C41E24 (Pantone 200 C), Print: White sublimation -->
<!-- Font: Montserrat ExtraBold — outline all text for final production -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="140mm" height="25mm"
     viewBox="0 0 529.13 94.49">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
    </style>
  </defs>

  <!-- Background: Signaal Rood #C41E24 / Pantone 200 C / CMYK C5 M100 Y95 K2 -->
  <rect width="529.13" height="94.49" fill="#C41E24"/>

  <!-- Subtle dark accent pinstripe top (0.6mm) -->
  <rect width="529.13" height="2.27" fill="#1A1A2E" opacity="0.2"/>
  <!-- Subtle dark accent pinstripe bottom (0.6mm) -->
  <rect y="92.22" width="529.13" height="2.27" fill="#1A1A2E" opacity="0.2"/>

  <!-- LINE 1: SignaalBewaking.nl — primary wordmark, centered -->
  <text x="264.57" y="27"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="17"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="1.2"
        text-rendering="geometricPrecision">
    SIGNAALBEWAKING.NL
  </text>

  <!-- LINE 2: Brand promise — THE differentiator -->
  <text x="264.57" y="46"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="8.5"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="1.5"
        opacity="0.85"
        text-rendering="geometricPrecision">
    UW PARTNER
  </text>

  <!-- LOGO: Real SignaalBewaking shield + checkmark (centered, white fill, red check) -->
  <g transform="translate(252.07, 50) scale(0.7)">
    <!-- Shield shape — white filled for contrast on red -->
    <path d="M16 8C16 8 24 4 24 4C24 4 32 8 32 8C32 8 32 22 32 22C32 30 24 36 24 36C24 36 16 30 16 22V8Z"
          fill="#FFFFFF" opacity="0.85"/>
    <!-- Checkmark — red stroke on white shield -->
    <path d="M20 20L23 23.5L29 16" stroke="#C41E24" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- LINE 3: Cert line + Powered by -->
  <text x="264.57" y="88"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="6"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="0.8"
        opacity="0.6"
        text-rendering="geometricPrecision">
    24/7 MELDKAMER · KIWA GECERTIFICEERD · POWERED BY SIGNAALAPP
  </text>
</svg>
