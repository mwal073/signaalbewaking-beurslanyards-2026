<?xml version="1.0" encoding="UTF-8"?>
<!-- Recyclebox Sticker — ±300 x 200mm wrap sticker for transparent recyclebox -->
<!-- Base: Donker #1A1A2E, border: Signaal Rood #C41E24, print: White -->
<!-- Material: Vinyl sticker, matte finish -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="300mm" height="200mm"
     viewBox="0 0 1133.86 755.91">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="1133.86" height="755.91" rx="15" fill="#1A1A2E"/>

  <!-- Red border (3mm = 11.34pt inset) -->
  <rect x="11.34" y="11.34" width="1111.18" height="733.23" rx="11" fill="none" stroke="#C41E24" stroke-width="3"/>

  <!-- === TOP LEFT: Real SignaalBewaking logo (white variant) === -->
  <g transform="translate(50, 40) scale(1.5)">
    <path d="M8 8C8 8 24 4 24 4C24 4 40 8 40 8C40 8 40 26 40 26C40 36 24 44 24 44C24 44 8 36 8 26V8Z"
          fill="#D00A2B"/>
    <path d="M20 22L24 26L32 16" stroke="#FFFFFF" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Logo text -->
  <text font-family="Roboto, sans-serif" font-weight="700">
    <tspan x="118" y="62" font-size="16" fill="#FFFFFF">Signaal</tspan>
    <tspan x="118" y="82" font-size="16" fill="#FFFFFF" opacity="0.8">Bewaking</tspan>
  </text>

  <!-- === CENTER: Main headline === -->
  <text x="566.93" y="300"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="56"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="3">
    INLEVERPUNT
  </text>

  <!-- Subheadline — punchy, direct -->
  <text x="566.93" y="370"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="20"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="0.8"
        opacity="0.7">
    voor lanyards zonder meldkamer.
  </text>

  <!-- Thin red separator -->
  <line x1="440" y1="410" x2="694" y2="410" stroke="#C41E24" stroke-width="2"/>

  <!-- === BOTTOM: Shield + brand + certs === -->

  <!-- Large shield centered -->
  <g transform="translate(539, 440) scale(1.8)">
    <path d="M16 8C16 8 24 4 24 4C24 4 32 8 32 8C32 8 32 22 32 22C32 30 24 36 24 36C24 36 16 30 16 22V8Z"
          fill="#D00A2B" opacity="0.6"/>
    <path d="M20 20L23 23.5L29 16" stroke="#FFFFFF" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  </g>

  <!-- Brand name -->
  <text x="566.93" y="530"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="18"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="3">
    SIGNAALBEWAKING.NL
  </text>

  <!-- Tagline -->
  <text x="566.93" y="560"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="10"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="1"
        opacity="0.5">
    Uw partner.
  </text>

  <!-- Cert strip -->
  <text x="566.93" y="600"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="8"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="0.8"
        opacity="0.35">
    Kiwa PAC00157 · ISO 27001 · EN 50518 · VEB
  </text>

  <!-- Powered by SignaalApp — subtle bottom -->
  <text x="566.93" y="720"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="7"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="0.5"
        opacity="0.25">
    Powered by SignaalApp
  </text>

</svg>
