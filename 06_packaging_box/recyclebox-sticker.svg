<?xml version="1.0" encoding="UTF-8"?>
<!-- Recyclebox Sticker — ±300 x 200mm wrap sticker for transparent recyclebox -->
<!-- Base: Donker #1A1A2E, border: Signaal Rood #C41E24, print: White -->
<!-- Material: Vinyl sticker, matte finish -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="300mm" height="200mm"
     viewBox="0 0 1133.86 755.91">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="1133.86" height="755.91" rx="15" fill="#1A1A2E"/>

  <!-- Red border (3mm = 11.34pt inset) -->
  <rect x="11.34" y="11.34" width="1111.18" height="733.23" rx="11" fill="none" stroke="#C41E24" stroke-width="3"/>

  <!-- Main headline -->
  <text x="566.93" y="280"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="42"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="2">
    INLEVERPUNT
  </text>

  <!-- Subheadline (the clever copy from briefing) -->
  <text x="566.93" y="340"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="16"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="1"
        opacity="0.75">
    voor kriebelende lintjes en trage offertesoftware.
  </text>

  <!-- Thin separator -->
  <line x1="430" y1="375" x2="704" y2="375" stroke="#C41E24" stroke-width="1.5"/>

  <!-- Recycle icon (simplified arrows circle) -->
  <g transform="translate(534.93, 400)" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.5">
    <path d="M32 4 L40 16 L24 16 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M50 28 C50 42 40 52 32 52"/>
    <path d="M8 48 L0 36 L16 36 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M14 24 C14 10 24 0 32 0"/>
    <path d="M52 36 L64 36 L56 48 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M40 52 C28 52 18 42 18 32"/>
  </g>

  <!-- Shield logo -->
  <g transform="translate(541.93, 490)">
    <path d="M25 0 L50 10 L50 30 C50 44 38 54 25 60 C12 54 0 44 0 30 L0 10 Z"
          fill="none" stroke="#C41E24" stroke-width="2"/>
    <g transform="translate(13, 16) scale(1)" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.7">
      <path stroke-linecap="round" d="M9.348 14.652a3.75 3.75 0 010-5.304m5.304 0a3.75 3.75 0 010 5.304m-7.425 2.121a6.75 6.75 0 010-9.546m9.546 0a6.75 6.75 0 010 9.546"/>
    </g>
  </g>

  <!-- Brand name bottom -->
  <text x="566.93" y="590"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="16"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="2">
    SIGNAALBEWAKING.NL
  </text>

  <!-- Tagline -->
  <text x="566.93" y="615"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="9"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="1.5"
        opacity="0.5">
    ALTIJD VERBONDEN MET VEILIGHEID
  </text>

</svg>
