    </g>
    <!-- Logo text -->
    <text text-anchor="middle" font-family="Roboto, sans-serif" font-weight="700">
      <tspan x="427" y="350" font-size="22" fill="#FFFFFF">Signaal</tspan>
      <tspan x="427" y="375" font-size="22" fill="#FFFFFF" opacity="0.8">Bewaking</tspan>
    </text>

    <!-- 24/7 MELDKAMER -->
    <text x="427" y="410"
          font-family="Montserrat, sans-serif" font-weight="800"
          font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="3" opacity="0.8">
      24/7 MELDKAMER
    </text>

    <!-- Separator -->
    <line x1="380" y1="425" x2="474" y2="425" stroke="#C41E24" stroke-width="1" opacity="0.6"/>

    <!-- Tagline -->
    <text x="427" y="445"
          font-family="Montserrat, sans-serif" font-weight="600"
          font-size="8" fill="#FFFFFF" text-anchor="middle" letter-spacing="1" opacity="0.5">
      Uw partner.
    </text>

    <!-- Cert icons -->
    <text x="427" y="475"
          font-family="Montserrat, sans-serif" font-weight="400"
          font-size="5.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5" opacity="0.35">
      Kiwa · ISO 27001 · EN 50518
    </text>

    <!-- URL -->
    <text x="427" y="500"
          font-family="Montserrat, sans-serif" font-weight="600"
          font-size="7" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.8" opacity="0.45">
      signaalbewaking.nl
    </text>
  </g>

  <!-- ============ BACK PANEL (120x100mm) ============ -->
  <g>
    <rect x="786.14" y="143.62" width="453.54" height="377.95" fill="#1A1A2E"/>

    <!-- Beurs info top -->
    <text x="1012.91" y="200"
          font-family="Montserrat, sans-serif" font-weight="600"
          font-size="7" fill="#FFFFFF" text-anchor="middle" letter-spacing="1" opacity="0.4">
      FIRE &amp; SAFETY BEURS 2026
    </text>
    <text x="1012.91" y="215"
          font-family="Montserrat, sans-serif" font-weight="400"
          font-size="6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5" opacity="0.3">
      Stand B.21 — Brabanthallen Den Bosch
    </text>

    <!-- QR placeholder (large, centered) -->
    <rect x="974" y="240" width="78" height="78" fill="#FFFFFF" rx="3"/>
    <!-- QR pattern suggestion -->
    <g transform="translate(981, 247)">
      <rect x="0" y="0" width="16" height="16" fill="#333"/>
      <rect x="48" y="0" width="16" height="16" fill="#333"/>
      <rect x="0" y="48" width="16" height="16" fill="#333"/>
      <rect x="3" y="3" width="10" height="10" fill="#fff"/>
      <rect x="51" y="3" width="10" height="10" fill="#fff"/>
      <rect x="3" y="51" width="10" height="10" fill="#fff"/>
      <rect x="6" y="6" width="4" height="4" fill="#333"/>
      <rect x="54" y="6" width="4" height="4" fill="#333"/>
      <rect x="6" y="54" width="4" height="4" fill="#333"/>
      <rect x="20" y="20" width="24" height="24" fill="#333" opacity="0.1" rx="2"/>
      <text x="32" y="35" font-family="Montserrat, sans-serif" font-weight="800" font-size="7" fill="#C41E24" text-anchor="middle">SB</text>
    </g>

    <!-- URL under QR -->
    <text x="1012.91" y="335"
          font-family="Montserrat, sans-serif" font-weight="400"
          font-size="6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5" opacity="0.5">
      signaalbewaking.nl/fss
    </text>

    <!-- CTA -->
    <text font-family="Montserrat, sans-serif" font-weight="800"
          font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">
      <tspan x="1012.91" y="380">Scan voor exclusieve</tspan>
      <tspan x="1012.91" y="395">beurscondities</tspan>
    </text>

    <!-- Separator -->
    <line x1="960" y1="415" x2="1066" y2="415" stroke="#C41E24" stroke-width="0.75" opacity="0.5"/>

    <!-- Powered by -->
    <text x="1012.91" y="440"
          font-family="Montserrat, sans-serif" font-weight="400"
          font-size="6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3" opacity="0.3">
      Powered by SignaalApp
    </text>

    <!-- Schipper Security -->
    <text x="1012.91" y="490"
          font-family="Montserrat, sans-serif" font-weight="400"
          font-size="5" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3" opacity="0.25">
      Onderdeel van Schipper Security
    </text>
  </g>

  <!-- ============ SIDE PANELS ============ -->
  <g>
    <rect x="68.03" y="143.62" width="132.28" height="377.95" fill="#1A1A2E"/>
    <text x="134.17" y="332.60"
          font-family="Montserrat, sans-serif" font-weight="800"
          font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5"
          transform="rotate(-90, 134.17, 332.60)">
      SIGNAALBEWAKING.NL
    </text>
  </g>
  <g>
    <rect x="653.86" y="143.62" width="132.28" height="377.95" fill="#1A1A2E"/>
    <text x="720" y="332.60"
          font-family="Montserrat, sans-serif" font-weight="800"
          font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5"
          transform="rotate(-90, 720, 332.60)">
      SIGNAALBEWAKING.NL
    </text>
  </g>

  <!-- ============ FLAPS ============ -->
  <!-- Top front flap with logo -->
  <g>
    <rect x="200.31" y="11.34" width="453.54" height="132.28" fill="#1A1A2E"/>
    <rect x="207.87" y="18.90" width="438.42" height="117.16" fill="none" stroke="#C41E24" stroke-width="0.75" rx="2"/>
    <!-- Small centered logo -->
