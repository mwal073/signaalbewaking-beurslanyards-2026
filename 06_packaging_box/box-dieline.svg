<?xml version="1.0" encoding="UTF-8"?>
<!-- Packaging Box Dieline — 120 x 100 x 35mm (W x H x D) + 3mm bleed -->
<!-- Material: 350gsm carton, Donker #1A1A2E base, white + Signaal Rood print -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="337mm" height="212mm"
     viewBox="0 0 1273.70 801.26">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background for non-print areas -->
  <rect width="1273.70" height="801.26" fill="#F5F5F5"/>

  <!-- Panel positions (from trim 11.34pt):
       Glue: x=11.34 w=56.69 | Side1: x=68.03 w=132.28 | Front: x=200.31 w=453.54
       Side2: x=653.86 w=132.28 | Back: x=786.14 w=453.54
       Top flaps: y=11.34 h=132.28 | Body: y=143.62 h=377.95 | Bottom flaps: y=521.57 h=132.28 -->

  <!-- === CUT LINES === -->
  <g fill="none" stroke="#000000" stroke-width="0.5">
    <path d="M28.34 143.62 L11.34 160 L11.34 505 L28.34 521.57 L68.03 521.57 L68.03 143.62 Z"/>
    <rect x="68.03" y="143.62" width="132.28" height="377.95"/>
    <rect x="200.31" y="143.62" width="453.54" height="377.95"/>
    <rect x="653.86" y="143.62" width="132.28" height="377.95"/>
    <rect x="786.14" y="143.62" width="453.54" height="377.95"/>
    <path d="M68.03 143.62 L68.03 77.48 L200.31 77.48 L200.31 143.62"/>
    <path d="M200.31 143.62 L200.31 11.34 L653.86 11.34 L653.86 143.62"/>
    <path d="M653.86 143.62 L653.86 77.48 L786.14 77.48 L786.14 143.62"/>
    <path d="M786.14 143.62 L786.14 11.34 L1239.68 11.34 L1239.68 143.62"/>
    <path d="M68.03 521.57 L68.03 587.71 L200.31 587.71 L200.31 521.57"/>
    <path d="M200.31 521.57 L200.31 653.86 L653.86 653.86 L653.86 521.57"/>
    <path d="M653.86 521.57 L653.86 587.71 L786.14 587.71 L786.14 521.57"/>
    <path d="M786.14 521.57 L786.14 653.86 L1239.68 653.86 L1239.68 521.57"/>
  </g>

  <!-- === FOLD LINES === -->
  <g fill="none" stroke="#C41E24" stroke-width="0.25" stroke-dasharray="4,2">
    <line x1="68.03" y1="11.34" x2="68.03" y2="653.86"/>
    <line x1="200.31" y1="11.34" x2="200.31" y2="653.86"/>
    <line x1="653.86" y1="11.34" x2="653.86" y2="653.86"/>
    <line x1="786.14" y1="11.34" x2="786.14" y2="653.86"/>
    <line x1="11.34" y1="143.62" x2="1239.68" y2="143.62"/>
    <line x1="11.34" y1="521.57" x2="1239.68" y2="521.57"/>
  </g>

  <!-- ============ FRONT PANEL (120x100mm) ============ -->
  <g>
    <rect x="200.31" y="143.62" width="453.54" height="377.95" fill="#1A1A2E"/>
    <!-- Red border inset -->
    <rect x="207.87" y="151.18" width="438.42" height="362.83" fill="none" stroke="#C41E24" stroke-width="1.5" rx="3"/>

