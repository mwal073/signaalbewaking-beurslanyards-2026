      <path d="M20 22L24 26L32 16" stroke="#C41E24" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
    </g>
  </g>
  <!-- Top back flap -->
  <rect x="786.14" y="11.34" width="453.54" height="132.28" fill="#1A1A2E"/>

  <!-- Bottom flaps -->
  <rect x="200.31" y="521.57" width="453.54" height="132.28" fill="#1A1A2E"/>
  <rect x="786.14" y="521.57" width="453.54" height="132.28" fill="#1A1A2E"/>

  <!-- Side dust flaps -->
  <rect x="68.03" y="77.48" width="132.28" height="66.14" fill="#1A1A2E" opacity="0.8"/>
  <rect x="653.86" y="77.48" width="132.28" height="66.14" fill="#1A1A2E" opacity="0.8"/>
  <rect x="68.03" y="521.57" width="132.28" height="66.14" fill="#1A1A2E" opacity="0.8"/>
  <rect x="653.86" y="521.57" width="132.28" height="66.14" fill="#1A1A2E" opacity="0.8"/>

  <!-- Glue tab -->
  <path d="M28.34 143.62 L11.34 160 L11.34 505 L28.34 521.57 L68.03 521.57 L68.03 143.62 Z"
        fill="#E0E0E0" stroke="#000000" stroke-width="0.5"/>
  <text x="40" y="335" font-family="monospace" font-size="6" fill="#999"
        text-anchor="middle" transform="rotate(-90, 40, 335)">GLUE TAB</text>

  <!-- Registration marks -->
  <g stroke="#000000" stroke-width="0.3" fill="none">
    <line x1="3" y1="3" x2="9" y2="3"/><line x1="3" y1="3" x2="3" y2="9"/><circle cx="3" cy="3" r="2"/>
    <line x1="1264" y1="3" x2="1270" y2="3"/><line x1="1270" y1="3" x2="1270" y2="9"/><circle cx="1270" cy="3" r="2"/>
    <line x1="3" y1="795" x2="9" y2="795"/><line x1="3" y1="789" x2="3" y2="795"/><circle cx="3" cy="795" r="2"/>
    <line x1="1264" y1="795" x2="1270" y2="795"/><line x1="1270" y1="789" x2="1270" y2="795"/><circle cx="1270" cy="795" r="2"/>
  </g>

  <!-- Dimension annotations -->
  <g opacity="0.25" fill="none" stroke="#0066CC" stroke-width="0.3" font-size="4" font-family="monospace">
    <text x="427" y="670" fill="#0066CC" text-anchor="middle">Front: 120x100mm | Sides: 35x100mm | Flaps: 35mm | 350gsm carton</text>
    <text x="427" y="680" fill="#0066CC" text-anchor="middle">Base: #1A1A2E (Pantone 5395 C) | Print: White + #C41E24 (Pantone 200 C)</text>
  </g>

</svg>
