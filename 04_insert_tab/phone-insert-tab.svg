<?xml version="1.0" encoding="UTF-8"?>
<!-- Phone Insert Tab — T-shape, TPU + nylon reinforced, 0.6mm -->
<!-- Print area: approximately 35mm x 18mm visible area -->
<!-- Base: White TPU, Print: Signaal Rood #C41E24 -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="45mm" height="75mm"
     viewBox="0 0 170.08 283.46">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
    </style>
  </defs>

  <!-- T-shape outline -->
  <g transform="translate(0, 0)">

    <!-- T-shape body -->
    <path d="M10 0 L160 0 L160 68 L115 68 L115 250 C115 262 105 270 85 270 C65 270 55 262 55 250 L55 68 L10 68 Z"
          fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>

    <!-- Cord attachment hole -->
    <circle cx="85" cy="255" r="8" fill="none" stroke="#CCCCCC" stroke-width="0.75"/>

    <!-- === VISIBLE BRANDING AREA (top plate) === -->

    <!-- Real SignaalBewaking shield logo — centered, top -->
    <g transform="translate(67, 4) scale(0.75)">
      <!-- Shield filled red -->
      <path d="M16 8C16 8 24 4 24 4C24 4 32 8 32 8C32 8 32 22 32 22C32 30 24 36 24 36C24 36 16 30 16 22V8Z"
            fill="#D00A2B"/>
      <!-- White checkmark -->
      <path d="M20 20L23 23.5L29 16" stroke="#FFFFFF" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- SIGNAALBEWAKING text -->
    <text x="85" y="50"
          font-family="Montserrat, sans-serif"
          font-weight="800"
          font-size="8"
          fill="#C41E24"
          text-anchor="middle"
          letter-spacing="0.8">
      SIGNAALBEWAKING
    </text>

    <!-- 24/7 MELDKAMER -->
    <text x="85" y="60"
          font-family="Montserrat, sans-serif"
          font-weight="600"
          font-size="5.5"
          fill="#333333"
          text-anchor="middle"
          letter-spacing="1.2">
      24/7 MELDKAMER
    </text>

    <!-- Thin red line separator -->
    <line x1="55" y1="64" x2="115" y2="64" stroke="#C41E24" stroke-width="0.5" opacity="0.5"/>

    <!-- On the strap portion — URL (more useful than SignaalApp) -->
    <text x="85" y="120"
          font-family="Montserrat, sans-serif"
          font-weight="600"
          font-size="4.5"
          fill="#888888"
          text-anchor="middle"
          letter-spacing="0.8"
          transform="rotate(-90, 85, 120)">
      SIGNAALBEWAKING.NL
    </text>

  </g>

  <!-- Dimension annotations (for factory, non-print layer) -->
  <g opacity="0.3" fill="none" stroke="#0066CC" stroke-width="0.3" font-size="4" font-family="monospace">
    <text x="5" y="280" fill="#0066CC">35mm x 18mm visible plate, 8mm x 55mm strap, 0.6mm TPU+nylon</text>
  </g>
</svg>
