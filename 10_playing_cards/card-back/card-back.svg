<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- Playing Card Back — with CORRECT logos matching actual brand assets -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>
    <pattern id="techGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="rgba(255,255,255,0.025)" stroke-width="0.3"/>
      <line x1="20" y1="0" x2="20" y2="20" stroke="rgba(255,255,255,0.025)" stroke-width="0.3"/>
    </pattern>
    <radialGradient id="redGlow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="rgba(196,30,36,0.1)"/>
      <stop offset="100%" stop-color="rgba(196,30,36,0)"/>
    </radialGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="170.1" height="259.8" rx="8" fill="url(#bgGrad)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#techGrid)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#redGlow)"/>

  <!-- Red accent lines top + bottom -->
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Inner frame -->
  <rect x="10" y="12" width="150.1" height="235.8" rx="4" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ═══ SCHIPPER SECURITY logo (exact: dark blue bg, white text, blue border) ═══ -->
  <g transform="translate(85.05, 42)">
    <!-- Blue background box with blue border -->
    <rect x="-38" y="-13" width="76" height="26" rx="2" fill="#1B3A6B" stroke="#2A5298" stroke-width="1"/>
    <!-- SCHIPPER -->
    <text x="0" y="-2" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="9" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">SCHIPPER</text>
    <!-- SECURITY -->
    <text x="0" y="9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="8.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">SECURITY</text>
  </g>

  <!-- ═══ SIGNAAL BEWAKING logo (exact: red top "SIGNAAL", white bottom "BEWAKING", red border) ═══ -->
  <g transform="translate(85.05, 82)">
    <!-- Outer red border -->
    <rect x="-38" y="-13" width="76" height="26" rx="2" fill="none" stroke="#C41E24" stroke-width="1.2"/>
    <!-- Top half: red with white text -->
    <rect x="-37" y="-12" width="74" height="12" fill="#C41E24"/>
    <text x="0" y="-3" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="8.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">SIGNAAL</text>
    <!-- Bottom half: white with black text -->
    <rect x="-37" y="0" width="74" height="12" fill="#FFFFFF"/>
    <text x="0" y="9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="7.5" fill="#1A1A2E" text-anchor="middle" letter-spacing="1.2">BEWAKING</text>
  </g>

  <!-- Center: Large shield icon with signal waves -->
  <g transform="translate(85.05, 142)">
    <!-- Shield -->
    <path d="M0-30L-22-21v15c0 17 10 32 22 37 12-5 22-20 22-37v-15L0-30z" fill="none" stroke="rgba(196,30,36,0.45)" stroke-width="1.2"/>
    <path d="M0-24L-17-17v11c0 13.5 8 25.5 17 29.5 9-4 17-16 17-29.5v-11L0-24z" fill="rgba(196,30,36,0.06)" stroke="rgba(196,30,36,0.25)" stroke-width="0.6"/>
    <!-- Checkmark -->
    <path d="M-8 0L-3 5L9-5" fill="none" stroke="#C41E24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Signal waves left -->
    <path d="M-26-8a20 20 0 0 0 0 20" fill="none" stroke="rgba(6,182,212,0.2)" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M-31-14a28 28 0 0 0 0 32" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Signal waves right -->
    <path d="M26-8a20 20 0 0 1 0 20" fill="none" stroke="rgba(6,182,212,0.2)" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M31-14a28 28 0 0 1 0 32" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="0.6" stroke-linecap="round"/>
  </g>

  <!-- Tagline -->
  <g transform="translate(85.05, 198)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2.5">ALTIJD VERBONDEN</text>
    <text x="0" y="9" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2.5">MET VEILIGHEID</text>
  </g>

  <!-- Bottom: POWERED BY SIGNAALAPP -->
  <g transform="translate(85.05, 230)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="3.8" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2">POWERED BY</text>
    <text x="-10" y="10" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">SIGNAAL</text>
    <text x="22" y="10" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6.5" fill="rgba(6,182,212,0.45)" text-anchor="middle">APP</text>
  </g>
</svg>