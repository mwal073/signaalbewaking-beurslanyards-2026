<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- Playing Card Back — matches signaalapp-banner-v9 style -->
  <!-- Dark navy base with red accents, bold logos -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1a0a0e"/>
    </linearGradient>
    <!-- Subtle tech grid pattern -->
    <pattern id="techGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="rgba(255,255,255,0.03)" stroke-width="0.3"/>
      <line x1="20" y1="0" x2="20" y2="20" stroke="rgba(255,255,255,0.03)" stroke-width="0.3"/>
    </pattern>
    <!-- Red glow -->
    <radialGradient id="redGlow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="rgba(196,30,36,0.12)"/>
      <stop offset="100%" stop-color="rgba(196,30,36,0)"/>
    </radialGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="170.1" height="259.8" rx="8" fill="url(#bgGrad)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#techGrid)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#redGlow)"/>

  <!-- Red accent lines top + bottom -->
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Inner frame -->
  <rect x="10" y="12" width="150.1" height="235.8" rx="4" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>

  <!-- SCHIPPER SECURITY logo block (filled dark blue rectangle, white text) — matches banner -->
  <g transform="translate(85.05, 42)">
    <rect x="-42" y="-12" width="84" height="24" rx="2" fill="#162040" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
    <text x="0" y="-1" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">SCHIPPER</text>
    <text x="0" y="9" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">SECURITY</text>
  </g>

  <!-- SIGNAAL BEWAKING logo block (filled red rectangle, white text) — matches banner -->
  <g transform="translate(85.05, 78)">
    <rect x="-42" y="-12" width="84" height="24" rx="2" fill="#C41E24"/>
    <text x="0" y="-1" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">SIGNAAL</text>
    <text x="0" y="9" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">BEWAKING</text>
  </g>

  <!-- Center: Large shield icon with signal waves -->
  <g transform="translate(85.05, 140)">
    <!-- Shield -->
    <path d="M0-32L-24-22v16c0 18 11 34.5 24 39 13-4.5 24-21 24-39v-16L0-32z" fill="none" stroke="rgba(196,30,36,0.5)" stroke-width="1.2"/>
    <path d="M0-26L-19-18v12c0 14.5 8.8 27.5 19 31 10.2-3.5 19-16.5 19-31v-12L0-26z" fill="rgba(196,30,36,0.08)" stroke="rgba(196,30,36,0.3)" stroke-width="0.8"/>
    <!-- Checkmark -->
    <path d="M-8 0L-3 5L9-5" fill="none" stroke="#C41E24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Signal waves left -->
    <path d="M-28-10a22 22 0 0 0 0 24" fill="none" stroke="rgba(196,30,36,0.2)" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M-33-16a30 30 0 0 0 0 36" fill="none" stroke="rgba(196,30,36,0.12)" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Signal waves right -->
    <path d="M28-10a22 22 0 0 1 0 24" fill="none" stroke="rgba(196,30,36,0.2)" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M33-16a30 30 0 0 1 0 36" fill="none" stroke="rgba(196,30,36,0.12)" stroke-width="0.6" stroke-linecap="round"/>
  </g>

  <!-- DE INNOVATIEVE ALARMCENTRALE styling: bold tagline -->
  <g transform="translate(85.05, 195)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5.5" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="3">ALTIJD VERBONDEN</text>
    <text x="0" y="10" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5.5" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="3">MET VEILIGHEID</text>
  </g>

  <!-- Bottom: SIGNAALAPP -->
  <g transform="translate(85.05, 232)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">POWERED BY</text>
    <text x="-9" y="11" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="0.5">SIGNAAL</text>
    <text x="24" y="11" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6.5" fill="rgba(6,182,212,0.5)" text-anchor="middle" letter-spacing="0.5">APP</text>
  </g>
</svg>