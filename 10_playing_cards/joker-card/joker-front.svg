<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- Joker Card — Front — Dark navy/red style matching banner -->
  <defs>
    <linearGradient id="jokerBg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="50%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#2a0a10"/>
    </linearGradient>
    <radialGradient id="jokerGlow" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="rgba(196,30,36,0.15)"/>
      <stop offset="100%" stop-color="rgba(196,30,36,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="170.1" height="259.8" rx="8" fill="url(#jokerBg)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#jokerGlow)"/>

  <!-- Red accent bars -->
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Corner J markers -->
  <text x="14" y="22" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="12" fill="#C41E24">J</text>
  <text x="156" y="22" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="end">JOKER</text>
  <g transform="translate(156, 248) rotate(180)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="12" fill="#C41E24">J</text>
  </g>

  <!-- Headline -->
  <g transform="translate(85.05, 50)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="13" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">DE JOKER</text>
    <text x="0" y="16" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="13" fill="#C41E24" text-anchor="middle" letter-spacing="0.3">IN BEVEILIGING?</text>
  </g>

  <!-- Divider line -->
  <line x1="30" y1="75" x2="140" y2="75" stroke="rgba(196,30,36,0.4)" stroke-width="0.5"/>

  <!-- Center: Shield with question mark -->
  <g transform="translate(85.05, 125)">
    <!-- Shield outline -->
    <path d="M0-30L-22-20v14c0 16 10 30.5 22 35 12-4.5 22-19 22-35v-14L0-30z" fill="rgba(196,30,36,0.08)" stroke="rgba(196,30,36,0.4)" stroke-width="1"/>
    <!-- X mark (wrong choice) -->
    <line x1="-10" y1="-8" x2="10" y2="8" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="-8" x2="-10" y2="8" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Question mark floating -->
    <text x="22" y="-18" font-family="Georgia, serif" font-size="24" fill="rgba(196,30,36,0.5)" font-weight="700">?</text>
  </g>

  <!-- Body text -->
  <g transform="translate(85.05, 172)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="5.8" fill="rgba(255,255,255,0.65)" text-anchor="middle">Sommige installateurs werken</text>
    <text x="0" y="9" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="5.8" fill="rgba(255,255,255,0.65)" text-anchor="middle">nog zonder SignaalApp.</text>
  </g>

  <!-- Punchline in red box -->
  <g transform="translate(85.05, 202)">
    <rect x="-60" y="-10" width="120" height="22" rx="3" fill="#C41E24"/>
    <text x="0" y="-1" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5.5" fill="#FFFFFF" text-anchor="middle">DE SLIMME INSTALLATEURS</text>
    <text x="0" y="8" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5.5" fill="#FFFFFF" text-anchor="middle">SPELEN DE WINNENDE KAART.</text>
  </g>

  <!-- CTA -->
  <g transform="translate(85.05, 233)">
    <rect x="-48" y="-6" width="96" height="14" rx="7" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
    <text x="0" y="3" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="0.5">SCAN DE QR &#x2192; SPEEL MEE</text>
  </g>

  <!-- SIGNAALAPP bottom -->
  <g transform="translate(85.05, 252)">
    <text x="-9" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="rgba(255,255,255,0.4)" text-anchor="middle">SIGNAAL</text>
    <text x="14" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="rgba(6,182,212,0.5)" text-anchor="middle">APP</text>
  </g>
</svg>