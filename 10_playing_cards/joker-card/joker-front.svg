<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- Joker Marketing Card — Front -->
  <!-- 57mm x 87mm playing card -->
  <defs>
    <linearGradient id="jokerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C41E24"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="170.1" height="259.8" rx="8" fill="url(#jokerGrad)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="170.1" y2="170.1" stroke="#fff" stroke-width="40"/>
    <line x1="0" y1="90" x2="170.1" y2="259.8" stroke="#fff" stroke-width="40"/>
  </g>

  <!-- Top: JOKER label -->
  <g transform="translate(85.05, 22)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="6">JOKER</text>
  </g>

  <!-- Main headline -->
  <g transform="translate(85.05, 52)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">DE JOKER</text>
    <text x="0" y="14" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">IN BEVEILIGING?</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="78" x2="130" y2="78" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>

  <!-- Joker illustration: question mark made of security icons -->
  <g transform="translate(85.05, 120)" opacity="0.9">
    <!-- Large question mark outline -->
    <text x="0" y="15" font-family="Georgia, serif" font-weight="700" font-size="60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" text-anchor="middle">?</text>
    <!-- Shield with X (wrong move) -->
    <g transform="translate(0, -15)">
      <path d="M0-18L-14-12v10c0 10 6.4 19.5 14 22 7.6-2.5 14-12 14-22v-10L0-18z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <line x1="-6" y1="-4" x2="6" y2="8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="-4" x2="-6" y2="8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Body text -->
  <g transform="translate(85.05, 165)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="5.8" fill="rgba(255,255,255,0.85)" text-anchor="middle">Sommige installateurs werken</text>
    <text x="0" y="9" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="5.8" fill="rgba(255,255,255,0.85)" text-anchor="middle">nog zonder SignaalApp.</text>
  </g>

  <g transform="translate(85.05, 192)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="6" fill="#FFFFFF" text-anchor="middle">De slimme installateurs</text>
    <text x="0" y="9.5" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="6" fill="#FFFFFF" text-anchor="middle">spelen de winnende kaart.</text>
  </g>

  <!-- Divider -->
  <line x1="50" y1="212" x2="120" y2="212" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>

  <!-- CTA -->
  <g transform="translate(85.05, 225)">
    <rect x="-45" y="-7" width="90" height="15" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
    <text x="0" y="3" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5.5" fill="#FFFFFF" text-anchor="middle">SCAN DE QR → SPEEL MEE</text>
  </g>

  <!-- Bottom: SignaalApp -->
  <g transform="translate(85.05, 248)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="4.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">SIGNAALAPP.NL</text>
  </g>

  <!-- Corner: Joker symbols -->
  <text x="14" y="18" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="9" fill="rgba(255,255,255,0.6)">J</text>
  <text x="156" y="253" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end" transform="rotate(180, 156, 249)">J</text>
</svg>