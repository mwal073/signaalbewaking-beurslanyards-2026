<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- Joker Card — Back (benefits + QR) — Dark style matching banner -->
  <defs>
    <linearGradient id="jbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e1a2b"/>
    </linearGradient>
  </defs>

  <rect width="170.1" height="259.8" rx="8" fill="url(#jbBg)"/>

  <!-- Red accent top -->
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>

  <!-- JOKER label -->
  <text x="85.05" y="18" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6" fill="rgba(196,30,36,0.5)" text-anchor="middle" letter-spacing="4">JOKER</text>

  <!-- Shield icon -->
  <g transform="translate(85.05, 40)">
    <path d="M0-12L-10-8v7c0 7.5 4.6 14 10 16 5.4-2 10-8.5 10-16v-7L0-12z" fill="#C41E24"/>
    <path d="M-4 1L-1 4L6-2" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Headline -->
  <text x="85.05" y="62" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="8" fill="#FFFFFF" text-anchor="middle">MET SIGNAALAPP:</text>

  <!-- Benefits -->
  <g transform="translate(18, 76)">
    <!-- 1 -->
    <g>
      <rect x="0" y="0" width="134" height="26" rx="4" fill="rgba(196,30,36,0.08)" stroke="rgba(196,30,36,0.15)" stroke-width="0.5"/>
      <rect x="4" y="4" width="18" height="18" rx="3" fill="#C41E24"/>
      <text x="13" y="16" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">&#10003;</text>
      <text x="28" y="11" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5.5" fill="#FFFFFF">Ontvang installatie-leads</text>
      <text x="28" y="20" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="4" fill="rgba(255,255,255,0.5)">Direct opdrachten in je regio</text>
    </g>
    <!-- 2 -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="134" height="26" rx="4" fill="rgba(196,30,36,0.08)" stroke="rgba(196,30,36,0.15)" stroke-width="0.5"/>
      <rect x="4" y="4" width="18" height="18" rx="3" fill="#C41E24"/>
      <text x="13" y="16" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">&#10003;</text>
      <text x="28" y="11" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5.5" fill="#FFFFFF">Verbind met de meldkamer</text>
      <text x="28" y="20" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="4" fill="rgba(255,255,255,0.5)">24/7 SignaalBewaking</text>
    </g>
    <!-- 3 -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="134" height="26" rx="4" fill="rgba(196,30,36,0.08)" stroke="rgba(196,30,36,0.15)" stroke-width="0.5"/>
      <rect x="4" y="4" width="18" height="18" rx="3" fill="#C41E24"/>
      <text x="13" y="16" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">&#10003;</text>
      <text x="28" y="11" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5.5" fill="#FFFFFF">Werk sneller en eenvoudiger</text>
      <text x="28" y="20" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="4" fill="rgba(255,255,255,0.5)">Eén platform, alles beheerd</text>
    </g>
    <!-- 4 -->
    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="134" height="26" rx="4" fill="rgba(196,30,36,0.08)" stroke="rgba(196,30,36,0.15)" stroke-width="0.5"/>
      <rect x="4" y="4" width="18" height="18" rx="3" fill="#C41E24"/>
      <text x="13" y="16" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">&#10003;</text>
      <text x="28" y="11" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5.5" fill="#FFFFFF">Verdien meer met beveiliging</text>
      <text x="28" y="20" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="4" fill="rgba(255,255,255,0.5)">Terugkerende omzet per installatie</text>
    </g>
  </g>

  <!-- Pro badge -->
  <g transform="translate(85.05, 201)">
    <rect x="-55" y="-10" width="110" height="22" rx="4" fill="#C41E24"/>
    <text x="0" y="-1" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">SIGNAALAPP PRO</text>
    <text x="0" y="8" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="5" fill="rgba(255,255,255,0.8)" text-anchor="middle">1 JAAR GRATIS</text>
  </g>

  <!-- Value -->
  <text x="85.05" y="222" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="4" fill="rgba(255,255,255,0.35)" text-anchor="middle" text-decoration="line-through">t.w.v. €99,95/maand</text>

  <!-- QR placeholder -->
  <g transform="translate(57, 230)">
    <rect x="0" y="0" width="22" height="22" rx="2" fill="#FFFFFF"/>
    <text x="11" y="10" font-family="monospace" font-size="3.5" fill="#0b1220" text-anchor="middle">QR</text>
    <text x="11" y="15" font-family="monospace" font-size="2.5" fill="#888" text-anchor="middle">CODE</text>
  </g>
  <g transform="translate(86, 238)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="5" fill="#FFFFFF">Scan &amp; start</text>
    <text x="0" y="9" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="4" fill="rgba(6,182,212,0.7)">signaalapp.nl</text>
  </g>

  <!-- Bottom logos -->
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Logo bar -->
  <g transform="translate(20, 257)">
    <rect x="0" y="-8" width="44" height="7" rx="1" fill="#C41E24"/>
    <text x="22" y="-3.5" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="3" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">SIGNAALBEWAKING</text>
  </g>
  <text x="130" y="253.5" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="3" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="0.5">SCHIPPER SECURITY</text>
</svg>