<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 2: De Oude Installateur — zonder SignaalApp, confused -->
  <defs>
    <linearGradient id="j2Bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="70%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>
  </defs>

  <rect width="170.1" height="259.8" rx="8" fill="url(#j2Bg)"/>
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Top left corner -->
  <text x="12" y="20" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="10" fill="rgba(255,255,255,0.3)">J</text>
  <text x="12" y="28" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="rgba(255,255,255,0.2)">OKER</text>

  <!-- Bottom right corner (upside down) -->
  <g transform="translate(158, 248) rotate(180)">
    <text x="0" y="8" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="10" fill="rgba(255,255,255,0.3)">J</text>
    <text x="0" y="16" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="rgba(255,255,255,0.2)">OKER</text>
  </g>

  <!-- ═══ OUDE INSTALLATEUR CHARACTER ═══ -->
  <g transform="translate(85.05, 108)">
    <!-- Hard hat (old, plain) -->
    <ellipse cx="0" cy="-52" rx="17" ry="5.5" fill="#666666"/>
    <rect x="-17" y="-57" width="34" height="7" rx="3.5" fill="#777777"/>
    <rect x="-13" y="-59" width="26" height="3.5" rx="1.5" fill="#888888"/>

    <!-- Head -->
    <circle cx="0" cy="-40" r="14" fill="#F0D0A0"/>
    <!-- Eyes (confused, worried) -->
    <circle cx="-5" cy="-42" r="1.8" fill="#1A1A2E"/>
    <circle cx="5" cy="-42" r="1.8" fill="#1A1A2E"/>
    <!-- Confused/worried mouth -->
    <path d="M-5-35 Q0-37 5-35" fill="none" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <!-- Eyebrows (worried, angled down in center) -->
    <line x1="-8" y1="-47" x2="-2" y2="-45.5" stroke="#6B4226" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="-45.5" x2="8" y2="-47" stroke="#6B4226" stroke-width="1" stroke-linecap="round"/>
    <!-- Sweat drop -->
    <path d="M13-44 Q14-48 15-44 Q14-42 13-44z" fill="#87CEEB" opacity="0.6"/>

    <!-- Body / old overalls -->
    <path d="M-16-26 L-18 15 Q-18 20 -13 20 L13 20 Q18 20 18 15 L16-26" fill="#3A3A4E" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <!-- No branded vest, plain -->
    <line x1="-14" y1="-15" x2="-14" y2="15" stroke="#555" stroke-width="1.5"/>
    <line x1="14" y1="-15" x2="14" y2="15" stroke="#555" stroke-width="1.5"/>

    <!-- Arms -->
    <!-- Left arm: holding stack of papers (chaos) -->
    <path d="M-16-18 L-28-2 L-26 8" fill="none" stroke="#F0D0A0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Stack of papers -->
    <rect x="-35" y="0" width="14" height="18" rx="1" fill="#FFFFFF" transform="rotate(-8, -28, 9)"/>
    <rect x="-34" y="1" width="14" height="18" rx="1" fill="#F5F5F5" transform="rotate(-3, -27, 10)"/>
    <rect x="-33" y="2" width="14" height="18" rx="1" fill="#EEEEEE" transform="rotate(2, -26, 11)"/>
    <!-- Lines on paper -->
    <line x1="-31" y1="6" x2="-22" y2="6" stroke="#CCC" stroke-width="0.5" transform="rotate(2, -26, 11)"/>
    <line x1="-31" y1="9" x2="-24" y2="9" stroke="#CCC" stroke-width="0.5" transform="rotate(2, -26, 11)"/>
    <line x1="-31" y1="12" x2="-22" y2="12" stroke="#CCC" stroke-width="0.5" transform="rotate(2, -26, 11)"/>

    <!-- Right arm: scratching head -->
    <path d="M16-18 L24-30 L18-42" fill="none" stroke="#F0D0A0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Hand near head -->
    <circle cx="18" cy="-44" r="3.5" fill="#F0D0A0"/>

    <!-- Legs -->
    <rect x="-10" y="20" width="8" height="22" rx="2" fill="#3A3A4E"/>
    <rect x="2" y="20" width="8" height="22" rx="2" fill="#3A3A4E"/>
    <!-- Old boots -->
    <rect x="-12" y="40" width="12" height="5" rx="2" fill="#444"/>
    <rect x="0" y="40" width="12" height="5" rx="2" fill="#444"/>

    <!-- Question marks floating (confused) -->
    <text x="-32" y="-40" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.15)" font-weight="700">?</text>
    <text x="24" y="-30" font-family="Georgia, serif" font-size="9" fill="rgba(255,255,255,0.1)" font-weight="700">?</text>
    <text x="30" y="5" font-family="Georgia, serif" font-size="7" fill="rgba(255,255,255,0.08)" font-weight="700">?</text>

    <!-- No signal waves (offline!) -->
    <line x1="-38" y1="2" x2="-32" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-32" y1="2" x2="-38" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Title below character -->
  <g transform="translate(85.05, 183)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6" fill="rgba(255,255,255,0.5)" text-anchor="middle">NOG STEEDS ZONDER</text>
    <text x="0" y="10" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6" fill="rgba(255,255,255,0.5)" text-anchor="middle">SIGNAALAPP?</text>
  </g>

  <!-- Punchline -->
  <g transform="translate(85.05, 210)">
    <rect x="-55" y="-8" width="110" height="18" rx="3" fill="rgba(196,30,36,0.15)" stroke="rgba(196,30,36,0.3)" stroke-width="0.5"/>
    <text x="0" y="-0.5" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="4.8" fill="rgba(255,255,255,0.7)" text-anchor="middle">Speel de winnende kaart.</text>
    <text x="0" y="7" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5" fill="#C41E24" text-anchor="middle">Claim je gratis Pro licentie.</text>
  </g>

  <!-- QR area -->
  <g transform="translate(85.05, 240)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#FFFFFF"/>
    <text x="0" y="-1" font-family="monospace" font-size="3" fill="#0b1220" text-anchor="middle">QR CODE</text>
    <text x="0" y="4" font-family="monospace" font-size="2.2" fill="#888" text-anchor="middle">signaalapp.nl</text>
  </g>
</svg>