<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 2: De Papierwerk Jester — zonder SignaalApp, classic jester style -->
  <defs>
    <linearGradient id="j2Bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="70%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>
  </defs>

  <rect width="170.1" height="259.8" rx="8" fill="url(#j2Bg)"/>
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="rgba(196,30,36,0.4)"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="rgba(196,30,36,0.4)"/>

  <!-- Inner border -->
  <rect x="8" y="8" width="154.1" height="243.8" rx="4" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <path d="M12 12 L24 12 M12 12 L12 24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M158 12 L146 12 M158 12 L158 24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M12 248 L24 248 M12 248 L12 236" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M158 248 L146 248 M158 248 L158 236" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Top left -->
  <g transform="translate(14, 14)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12" fill="rgba(255,255,255,0.3)">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="5" fill="rgba(255,255,255,0.2)" letter-spacing="0.5">OKER</text>
    <!-- Broken shield -->
    <path d="M2 22 L2 26 Q2 30 6 31 Q10 30 10 26 L10 22 L6 20 L2 22z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
    <line x1="3" y1="23" x2="9" y2="29" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  </g>

  <!-- Bottom right -->
  <g transform="translate(156, 246) rotate(180)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12" fill="rgba(255,255,255,0.3)">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="5" fill="rgba(255,255,255,0.2)" letter-spacing="0.5">OKER</text>
    <path d="M2 22 L2 26 Q2 30 6 31 Q10 30 10 26 L10 22 L6 20 L2 22z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
    <line x1="3" y1="23" x2="9" y2="29" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  </g>

  <!-- ═══════ JESTER CHARACTER (muted/faded, struggling) ═══════ -->
  <g transform="translate(85, 125)" opacity="0.85">

    <!-- ── Jester hat (droopy, sad) ── -->
    <path d="M-18-58 Q-16-50 0-48 Q16-50 18-58" fill="#555" stroke="#444" stroke-width="0.5"/>
    <!-- Left point (drooping) -->
    <path d="M-18-58 Q-28-65 -32-55 Q-30-50 -26-52" fill="#555" stroke="#444" stroke-width="0.5"/>
    <!-- Center point (flopping over) -->
    <path d="M-5-48 Q-2-70 8-65" fill="#444" stroke="#555" stroke-width="0.5"/>
    <!-- Right point (drooping) -->
    <path d="M18-58 Q28-65 32-55 Q30-50 26-52" fill="#555" stroke="#444" stroke-width="0.5"/>
    <!-- Dull bells -->
    <circle cx="-28" cy="-52" r="2.5" fill="#888" stroke="#777" stroke-width="0.5"/>
    <circle cx="8" cy="-64" r="2.5" fill="#888" stroke="#777" stroke-width="0.5"/>
    <circle cx="28" cy="-52" r="2.5" fill="#888" stroke="#777" stroke-width="0.5"/>
    <!-- Hat band (worn) -->
    <path d="M-18-56 Q0-52 18-56" fill="none" stroke="#777" stroke-width="1"/>

    <!-- ── Face (worried/confused) ── -->
    <ellipse cx="0" cy="-40" rx="15" ry="16" fill="#FAE0C0" stroke="#E8C8A0" stroke-width="0.5"/>
    <!-- Eyes (wide, worried) -->
    <ellipse cx="-6" cy="-43" rx="2.5" ry="3" fill="#FFFFFF" stroke="#333" stroke-width="0.3"/>
    <circle cx="-5.5" cy="-42" r="1.5" fill="#1A1A2E"/>
    <ellipse cx="6" cy="-43" rx="2.5" ry="3" fill="#FFFFFF" stroke="#333" stroke-width="0.3"/>
    <circle cx="6.5" cy="-42" r="1.5" fill="#1A1A2E"/>
    <!-- Pupils looking up (helpless) -->
    <circle cx="-5.5" cy="-43" r="0.5" fill="#FFFFFF"/>
    <circle cx="6.5" cy="-43" r="0.5" fill="#FFFFFF"/>
    <!-- Worried eyebrows -->
    <path d="M-9-47 Q-6-46 -3-48" fill="none" stroke="#8B6914" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M3-48 Q6-46 9-47" fill="none" stroke="#8B6914" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M-1-38 Q0-36 1-38" fill="none" stroke="#D4A080" stroke-width="0.8"/>
    <!-- Grimace/worried mouth -->
    <path d="M-6-33 Q-3-35 0-34 Q3-35 6-33" fill="none" stroke="#A0522D" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Sweat drops -->
    <path d="M15-45 Q16-48 17-45 Q16-43 15-45z" fill="#87CEEB" opacity="0.5"/>
    <path d="M-16-42 Q-15-44 -14-42 Q-15-41 -16-42z" fill="#87CEEB" opacity="0.3"/>

    <!-- ── Ruff collar (messy, uneven) ── -->
    <path d="M-20-24 L-17-19 L-13-25 L-9-18 L-4-25 L0-19 L4-25 L9-19 L13-24 L17-19 L20-24" fill="none" stroke="#999" stroke-width="1"/>

    <!-- ── Torso (all gray, no branding) ── -->
    <path d="M-18-20 L-20 30 Q-20 35 -10 35 L0 35 L0-20 Z" fill="#555" stroke="#444" stroke-width="0.3"/>
    <path d="M0-20 L0 35 L10 35 Q20 35 20 30 L18-20 Z" fill="#4A4A4A" stroke="#3A3A3A" stroke-width="0.3"/>
    <!-- Faded diamonds -->
    <path d="M-9-8 L-13-2 L-9 4 L-5-2 Z" fill="none" stroke="#666" stroke-width="0.4"/>
    <path d="M9-8 L5-2 L9 4 L13-2 Z" fill="none" stroke="#555" stroke-width="0.4"/>
    <!-- Plain belt -->
    <rect x="-18" y="14" width="36" height="4" rx="1" fill="#666" stroke="#555" stroke-width="0.3"/>

    <!-- ── Left arm: dropping papers ── -->
    <path d="M-18-16 Q-26-6 -28 8" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
    <path d="M-28 8 Q-30 18 -26 25" fill="none" stroke="#555" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-26" cy="25" r="4" fill="#FAE0C0" stroke="#E8C8A0" stroke-width="0.3"/>
    <!-- Stack of falling papers -->
    <g transform="translate(-32, 15)">
      <rect x="-5" y="-8" width="10" height="14" rx="0.5" fill="#FFF" stroke="#DDD" stroke-width="0.3" transform="rotate(-15)"/>
      <rect x="-4" y="-6" width="10" height="14" rx="0.5" fill="#F8F8F8" stroke="#DDD" stroke-width="0.3" transform="rotate(-5)"/>
      <rect x="-3" y="-4" width="10" height="14" rx="0.5" fill="#F5F5F5" stroke="#DDD" stroke-width="0.3" transform="rotate(8)"/>
      <!-- Lines on top paper -->
      <line x1="-1" y1="-1" x2="5" y2="-1" stroke="#CCC" stroke-width="0.4" transform="rotate(8)"/>
      <line x1="-1" y1="2" x2="4" y2="2" stroke="#CCC" stroke-width="0.4" transform="rotate(8)"/>
      <line x1="-1" y1="5" x2="5" y2="5" stroke="#CCC" stroke-width="0.4" transform="rotate(8)"/>
    </g>
    <!-- Loose paper falling -->
    <g transform="translate(-40, 30) rotate(-25)">
      <rect x="0" y="0" width="8" height="11" rx="0.5" fill="#FFF" stroke="#DDD" stroke-width="0.3"/>
      <line x1="1" y1="3" x2="6" y2="3" stroke="#CCC" stroke-width="0.3"/>
      <line x1="1" y1="5" x2="5" y2="5" stroke="#CCC" stroke-width="0.3"/>
    </g>

    <!-- ── Right arm: scratching head ── -->
    <path d="M18-16 Q26-20 22-35" fill="none" stroke="#4A4A4A" stroke-width="6" stroke-linecap="round"/>
    <circle cx="22" cy="-38" r="4" fill="#FAE0C0" stroke="#E8C8A0" stroke-width="0.3"/>

    <!-- ── Question marks floating ── -->
    <text x="-35" y="-50" font-family="Georgia, serif" font-size="14" fill="rgba(255,255,255,0.12)" font-weight="700">?</text>
    <text x="28" y="-20" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.08)" font-weight="700">?</text>
    <text x="32" y="20" font-family="Georgia, serif" font-size="8" fill="rgba(255,255,255,0.06)" font-weight="700">?</text>

    <!-- ── Legs ── -->
    <path d="M-8 35 L-10 60" fill="none" stroke="#555" stroke-width="7" stroke-linecap="round"/>
    <path d="M8 35 L10 60" fill="none" stroke="#4A4A4A" stroke-width="7" stroke-linecap="round"/>
    <!-- Worn jester shoes -->
    <path d="M-14 58 Q-16 62 -10 62 Q-4 62 -2 59 Q0 56 -6 56" fill="#555" stroke="#444" stroke-width="0.5"/>
    <circle cx="-2" cy="59" r="1.5" fill="#888"/>
    <path d="M6 58 Q4 62 10 62 Q16 62 18 59 Q20 56 14 56" fill="#4A4A4A" stroke="#3A3A3A" stroke-width="0.5"/>
    <circle cx="18" cy="59" r="1.5" fill="#888"/>
  </g>

  <!-- ── Bottom text ── -->
  <g transform="translate(85, 205)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5.5" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="0.5">NOG ZONDER SIGNAALAPP?</text>
  </g>

  <!-- CTA -->
  <g transform="translate(85, 222)">
    <rect x="-48" y="-7" width="96" height="16" rx="3" fill="rgba(196,30,36,0.12)" stroke="rgba(196,30,36,0.3)" stroke-width="0.5"/>
    <text x="0" y="-0.5" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="4.5" fill="rgba(255,255,255,0.5)" text-anchor="middle">Speel de winnende kaart.</text>
    <text x="0" y="6.5" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="#C41E24" text-anchor="middle">Claim je gratis Pro licentie.</text>
  </g>

  <!-- QR -->
  <g transform="translate(85, 245)">
    <rect x="-10" y="-7" width="20" height="14" rx="2" fill="#FFFFFF"/>
    <text x="0" y="-0.5" font-family="monospace" font-size="3" fill="#0b1220" text-anchor="middle">QR</text>
    <text x="0" y="4" font-family="monospace" font-size="2" fill="#888" text-anchor="middle">signaalapp.nl</text>
  </g>
</svg>