<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 2: Line-art Jester — traditional B&W playing card style, white background -->

  <!-- White card background -->
  <rect width="170.1" height="259.8" rx="8" fill="#FFFFFF"/>
  <rect x="5" y="5" width="160.1" height="249.8" rx="5" fill="none" stroke="#333333" stroke-width="0.4"/>

  <!-- Top left: JOKER -->
  <g transform="translate(12, 14)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="11" fill="#333333">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">O</text>
    <text x="0" y="27" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">K</text>
    <text x="0" y="35" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">E</text>
    <text x="0" y="43" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">R</text>
  </g>

  <!-- Bottom right: JOKER (upside down) -->
  <g transform="translate(159, 246) rotate(180)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="11" fill="#333333">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">O</text>
    <text x="0" y="27" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">K</text>
    <text x="0" y="35" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">E</text>
    <text x="0" y="43" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#333333" letter-spacing="0.3">R</text>
  </g>

  <!-- ═══════ LINE-ART JESTER (pen & ink style, B&W) ═══════ -->
  <g transform="translate(85, 128)" fill="none" stroke="#222222" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── Jester hat (3-pointed, outlined) ── -->
    <path d="M-20-58 Q-18-50 0-48 Q18-50 20-58"/>
    <path d="M-20-58 Q-32-75 -38-62 Q-35-56 -30-55"/>
    <path d="M-6-48 Q0-82 6-48"/>
    <path d="M20-58 Q32-75 38-62 Q35-56 30-55"/>
    <!-- Bells (small circles) -->
    <circle cx="-33" cy="-58" r="3" stroke-width="0.8"/>
    <line x1="-33" y1="-61" x2="-33" y2="-58" stroke-width="0.5"/>
    <circle cx="0" cy="-80" r="3" stroke-width="0.8"/>
    <line x1="0" y1="-83" x2="0" y2="-80" stroke-width="0.5"/>
    <circle cx="33" cy="-58" r="3" stroke-width="0.8"/>
    <line x1="33" y1="-61" x2="33" y2="-58" stroke-width="0.5"/>
    <!-- Hat band -->
    <path d="M-20-56 Q0-52 20-56" stroke-width="1.2"/>

    <!-- ── Face ── -->
    <ellipse cx="0" cy="-38" rx="16" ry="17" stroke-width="1"/>
    <!-- Eyes -->
    <ellipse cx="-6" cy="-42" rx="2.5" ry="3" stroke-width="0.6"/>
    <circle cx="-5.5" cy="-41.5" r="1.5" fill="#222222" stroke="none"/>
    <ellipse cx="6" cy="-42" rx="2.5" ry="3" stroke-width="0.6"/>
    <circle cx="6.5" cy="-41.5" r="1.5" fill="#222222" stroke="none"/>
    <!-- Eyebrows -->
    <path d="M-10-47 Q-6-49 -3-47" stroke-width="0.7"/>
    <path d="M3-47 Q6-49 10-46" stroke-width="0.7"/>
    <!-- Nose -->
    <path d="M-1-36 Q0-33 1-36" stroke-width="0.7"/>
    <!-- Smile -->
    <path d="M-7-30 Q0-24 7-30" stroke-width="0.8"/>

    <!-- ── Ruff collar ── -->
    <path d="M-22-20 L-18-15 L-13-22 L-9-15 L-4-22 L0-15 L4-22 L9-15 L13-22 L18-15 L22-20" stroke-width="0.8"/>

    <!-- ── Torso outline ── -->
    <path d="M-20-16 L-22 32 Q-22 38 -12 38 L12 38 Q22 38 22 32 L20-16" stroke-width="0.8"/>
    <!-- Center line (split costume) -->
    <line x1="0" y1="-16" x2="0" y2="38" stroke-width="0.4" stroke-dasharray="2,2"/>
    <!-- Diamond patterns -->
    <path d="M-10-4 L-14 2 L-10 8 L-6 2 Z" stroke-width="0.5"/>
    <path d="M10-4 L6 2 L10 8 L14 2 Z" stroke-width="0.5"/>
    <path d="M-10 14 L-14 20 L-10 26 L-6 20 Z" stroke-width="0.5"/>
    <path d="M10 14 L6 20 L10 26 L14 20 Z" stroke-width="0.5"/>
    <!-- Belt -->
    <rect x="-20" y="16" width="40" height="4" rx="1" stroke-width="0.6"/>
    <rect x="-3" y="15" width="6" height="6" rx="1" stroke-width="0.6"/>

    <!-- ── Left arm + staff ── -->
    <path d="M-20-12 Q-30-2 -32 10 Q-34 20 -30 25" stroke-width="1.2"/>
    <circle cx="-30" cy="27" r="4" stroke-width="0.8"/>
    <!-- Staff -->
    <line x1="-30" y1="27" x2="-30" y2="-48" stroke-width="1.5"/>
    <!-- Staff top: simple diamond -->
    <path d="M-30-53 L-34-58 L-30-63 L-26-58 Z" stroke-width="0.8"/>

    <!-- ── Right arm ── -->
    <path d="M20-12 Q30-2 32 6 Q34 16 30 22" stroke-width="1.2"/>
    <circle cx="30" cy="24" r="4" stroke-width="0.8"/>
    <!-- Mandolin/lute in right hand -->
    <g transform="translate(38, 10) rotate(20)">
      <ellipse cx="0" cy="0" rx="6" ry="8" stroke-width="0.7"/>
      <ellipse cx="0" cy="0" rx="2" ry="3" stroke-width="0.4"/>
      <line x1="0" y1="-8" x2="0" y2="-22" stroke-width="1"/>
      <line x1="-2" y1="-22" x2="2" y2="-22" stroke-width="0.8"/>
      <!-- Strings -->
      <line x1="-1" y1="-7" x2="-1" y2="-20" stroke-width="0.2"/>
      <line x1="1" y1="-7" x2="1" y2="-20" stroke-width="0.2"/>
    </g>

    <!-- ── Legs ── -->
    <path d="M-9 38 L-13 65" stroke-width="1.2"/>
    <path d="M9 38 L13 65" stroke-width="1.2"/>
    <!-- Curled jester shoes (outlined) -->
    <path d="M-18 63 Q-20 68 -13 69 Q-6 70 -4 66 Q-2 62 -9 62" stroke-width="0.8"/>
    <circle cx="-4" cy="66" r="2" stroke-width="0.5"/>
    <path d="M9 63 Q7 68 13 69 Q20 70 22 66 Q24 62 17 62" stroke-width="0.8"/>
    <circle cx="22" cy="66" r="2" stroke-width="0.5"/>
  </g>

  <!-- Small diamond decoration -->
  <text x="85" y="250" font-family="serif" font-size="6" fill="#333333" text-anchor="middle">&#9830;</text>
</svg>
