<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 2: Line-art Jester — white bg, traditional proportions -->

  <rect width="170.1" height="259.8" rx="8" fill="#FFFFFF"/>
  <rect x="5" y="5" width="160.1" height="249.8" rx="5" fill="none" stroke="#444" stroke-width="0.3"/>

  <!-- Top-left JOKER -->
  <g transform="translate(13, 16)">
    <text x="0" y="9" font-family="Georgia, serif" font-weight="700" font-size="10" fill="#333">J</text>
    <text x="0" y="18" font-family="Georgia, serif" font-size="6.5" fill="#333">O</text>
    <text x="0" y="26" font-family="Georgia, serif" font-size="6.5" fill="#333">K</text>
    <text x="0" y="34" font-family="Georgia, serif" font-size="6.5" fill="#333">E</text>
    <text x="0" y="42" font-family="Georgia, serif" font-size="6.5" fill="#333">R</text>
    <text x="3" y="52" font-family="serif" font-size="7" fill="#333">&#9830;</text>
  </g>

  <!-- Bottom-right JOKER -->
  <g transform="translate(157, 244) rotate(180)">
    <text x="0" y="9" font-family="Georgia, serif" font-weight="700" font-size="10" fill="#333">J</text>
    <text x="0" y="18" font-family="Georgia, serif" font-size="6.5" fill="#333">O</text>
    <text x="0" y="26" font-family="Georgia, serif" font-size="6.5" fill="#333">K</text>
    <text x="0" y="34" font-family="Georgia, serif" font-size="6.5" fill="#333">E</text>
    <text x="0" y="42" font-family="Georgia, serif" font-size="6.5" fill="#333">R</text>
    <text x="3" y="52" font-family="serif" font-size="7" fill="#333">&#9830;</text>
  </g>

  <!-- ═══════ LINE-ART JESTER ═══════ -->
  <g transform="translate(85, 0)" fill="none" stroke="#222" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── HAT (3 points) y=22..62 ── -->
    <path d="M-12 62 Q-18 52 -8 48 Q-22 38 -28 28 Q-34 38 -30 44" stroke-width="0.9"/>
    <circle cx="-30" cy="44" r="3" stroke-width="0.6"/>
    <line x1="-30" y1="41" x2="-30" y2="44" stroke-width="0.4"/>
    <path d="M-8 48 Q0 22 8 48" stroke-width="0.9"/>
    <circle cx="0" cy="22" r="3" stroke-width="0.6"/>
    <line x1="0" y1="19" x2="0" y2="22" stroke-width="0.4"/>
    <path d="M8 48 Q18 52 12 62" stroke-width="0.9"/>
    <path d="M8 48 Q22 38 28 28 Q34 38 30 44" stroke-width="0.9"/>
    <circle cx="30" cy="44" r="3" stroke-width="0.6"/>
    <line x1="30" y1="41" x2="30" y2="44" stroke-width="0.4"/>
    <!-- Hat band -->
    <path d="M-12 60 Q0 55 12 60" stroke-width="1"/>

    <!-- ── FACE y=58..92 ── -->
    <ellipse cx="0" cy="76" rx="14" ry="16" stroke-width="0.8"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="72" rx="2.5" ry="2.8" stroke-width="0.5"/>
    <circle cx="-4.5" cy="71.5" r="1.4" fill="#222" stroke="none"/>
    <ellipse cx="5" cy="72" rx="2.5" ry="2.8" stroke-width="0.5"/>
    <circle cx="5.5" cy="71.5" r="1.4" fill="#222" stroke="none"/>
    <!-- Eyebrows -->
    <path d="M-8 68 Q-5 66 -2 68" stroke-width="0.6"/>
    <path d="M2 68 Q5 66 8 67" stroke-width="0.6"/>
    <!-- Nose -->
    <path d="M-1 78 Q0 80 1 78" stroke-width="0.6"/>
    <!-- Smile -->
    <path d="M-6 83 Q0 89 6 83" stroke-width="0.7"/>

    <!-- ── RUFF COLLAR y=90..97 ── -->
    <path d="M-18 94 L-14 90 L-10 96 L-6 90 L-2 96 L2 90 L6 96 L10 90 L14 96 L18 90 L22 94" stroke-width="0.7"/>

    <!-- ── TORSO y=94..160 ── -->
    <path d="M-16 94 L-18 156 Q-18 162 -8 162 L8 162 Q18 162 18 156 L16 94" stroke-width="0.7"/>
    <!-- Center split -->
    <line x1="0" y1="94" x2="0" y2="162" stroke-width="0.3" stroke-dasharray="2,2"/>
    <!-- Diamonds -->
    <path d="M-8 108 L-11 114 L-8 120 L-5 114 Z" stroke-width="0.5"/>
    <path d="M8 108 L5 114 L8 120 L11 114 Z" stroke-width="0.5"/>
    <path d="M-8 130 L-11 136 L-8 142 L-5 136 Z" stroke-width="0.5"/>
    <path d="M8 130 L5 136 L8 142 L11 136 Z" stroke-width="0.5"/>
    <!-- Belt -->
    <rect x="-16" y="148" width="32" height="4" rx="1" stroke-width="0.5"/>
    <rect x="-3" y="147" width="6" height="6" rx="1" stroke-width="0.5"/>

    <!-- ── LEFT ARM + STAFF ── -->
    <path d="M-16 100 Q-26 110 -28 124 Q-30 136 -26 146" stroke-width="1"/>
    <circle cx="-26" cy="148" r="3.5" stroke-width="0.6"/>
    <!-- Staff -->
    <line x1="-26" y1="148" x2="-26" y2="52" stroke-width="1.2"/>
    <!-- Staff top: diamond -->
    <path d="M-26 46 L-30 52 L-26 58 L-22 52 Z" stroke-width="0.6"/>

    <!-- ── RIGHT ARM + MANDOLIN ── -->
    <path d="M16 100 Q26 108 28 120 Q30 132 26 142" stroke-width="1"/>
    <circle cx="26" cy="144" r="3.5" stroke-width="0.6"/>
    <!-- Mandolin -->
    <g transform="translate(34, 126) rotate(18)">
      <ellipse cx="0" cy="0" rx="5.5" ry="7.5" stroke-width="0.6"/>
      <ellipse cx="0" cy="0" rx="1.8" ry="2.5" stroke-width="0.35"/>
      <line x1="0" y1="-7.5" x2="0" y2="-20" stroke-width="0.9"/>
      <line x1="-1.5" y1="-20" x2="1.5" y2="-20" stroke-width="0.7"/>
      <line x1="-0.7" y1="-7" x2="-0.7" y2="-18" stroke-width="0.15"/>
      <line x1="0.7" y1="-7" x2="0.7" y2="-18" stroke-width="0.15"/>
    </g>

    <!-- ── LEGS y=160..204 ── -->
    <path d="M-7 162 L-11 204" stroke-width="1"/>
    <path d="M7 162 L11 204" stroke-width="1"/>

    <!-- ── SHOES y=202..214 ── -->
    <path d="M-15 202 Q-17 208 -11 210 Q-5 211 -3 207 Q-1 203 -7 202" stroke-width="0.6"/>
    <circle cx="-3" cy="207" r="2" stroke-width="0.5"/>
    <path d="M7 202 Q5 208 11 210 Q17 211 19 207 Q21 203 15 202" stroke-width="0.6"/>
    <circle cx="19" cy="207" r="2" stroke-width="0.5"/>
  </g>

  <!-- Bottom center diamond -->
  <text x="85" y="248" font-family="serif" font-size="5" fill="#333" text-anchor="middle">&#9830;</text>
</svg>
