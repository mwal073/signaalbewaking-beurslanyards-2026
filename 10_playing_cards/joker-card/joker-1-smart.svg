<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 1: De Slimme Installateur — met SignaalApp, winning -->
  <defs>
    <linearGradient id="j1Bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="70%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>
    <radialGradient id="j1Glow" cx="0.5" cy="0.4" r="0.35">
      <stop offset="0%" stop-color="rgba(6,182,212,0.1)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0)"/>
    </radialGradient>
  </defs>

  <rect width="170.1" height="259.8" rx="8" fill="url(#j1Bg)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#j1Glow)"/>
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Top left corner -->
  <text x="12" y="20" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="10" fill="#C41E24">J</text>
  <text x="12" y="28" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="rgba(255,255,255,0.4)">OKER</text>

  <!-- Bottom right corner (upside down) -->
  <g transform="translate(158, 248) rotate(180)">
    <text x="0" y="8" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="10" fill="#C41E24">J</text>
    <text x="0" y="16" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4.5" fill="rgba(255,255,255,0.4)">OKER</text>
  </g>

  <!-- ═══ SLIMME INSTALLATEUR CHARACTER ═══ -->
  <g transform="translate(85.05, 110)">
    <!-- Body: modern security installer -->
    <!-- Hard hat / helm -->
    <ellipse cx="0" cy="-52" rx="18" ry="6" fill="#C41E24"/>
    <rect x="-18" y="-58" width="36" height="8" rx="4" fill="#C41E24"/>
    <rect x="-14" y="-60" width="28" height="4" rx="2" fill="#E8343A"/>
    <!-- Head lamp on hat -->
    <circle cx="0" cy="-55" r="3" fill="#06B6D4"/>
    <circle cx="0" cy="-55" r="1.5" fill="#FFFFFF" opacity="0.8"/>

    <!-- Head -->
    <circle cx="0" cy="-40" r="14" fill="#F0D0A0"/>
    <!-- Eyes (confident smile) -->
    <circle cx="-5" cy="-42" r="1.8" fill="#1A1A2E"/>
    <circle cx="5" cy="-42" r="1.8" fill="#1A1A2E"/>
    <circle cx="-4.2" cy="-42.6" r="0.5" fill="#FFFFFF"/>
    <circle cx="5.8" cy="-42.6" r="0.5" fill="#FFFFFF"/>
    <!-- Confident smile -->
    <path d="M-6-36 Q0-32 6-36" fill="none" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <!-- Eyebrows (raised, confident) -->
    <line x1="-8" y1="-46" x2="-2" y2="-47" stroke="#6B4226" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="-47" x2="8" y2="-46" stroke="#6B4226" stroke-width="1" stroke-linecap="round"/>

    <!-- Body / vest -->
    <path d="M-16-26 L-20 15 Q-20 20 -15 20 L15 20 Q20 20 20 15 L16-26" fill="#1A1A2E" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    <!-- Safety vest stripes -->
    <line x1="-14" y1="-15" x2="-14" y2="15" stroke="#C41E24" stroke-width="2.5"/>
    <line x1="14" y1="-15" x2="14" y2="15" stroke="#C41E24" stroke-width="2.5"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#C41E24" stroke-width="2"/>
    <!-- SIGNAAL badge on chest -->
    <rect x="-12" y="-18" width="24" height="8" rx="1.5" fill="#C41E24"/>
    <text x="0" y="-12.5" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="4" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">SIGNAAL</text>

    <!-- Arms -->
    <!-- Left arm: holding phone with app -->
    <path d="M-16-20 L-28-5 L-26 5" fill="none" stroke="#F0D0A0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Phone in left hand -->
    <rect x="-32" y="-2" width="12" height="20" rx="2" fill="#1A1A2E" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    <rect x="-31" y="1" width="10" height="14" rx="1" fill="#06B6D4" opacity="0.3"/>
    <!-- Shield check on phone screen -->
    <path d="M-26 5 L-26 2 L-23 0.5 L-20 2 L-20 5 Q-20 8 -23 9.5 Q-26 8 -26 5z" fill="#06B6D4" opacity="0.6"/>
    <path d="M-25 4.5 L-23.5 6 L-21 3" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>

    <!-- Right arm: thumbs up -->
    <path d="M16-20 L28-10 L30-15" fill="none" stroke="#F0D0A0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Thumb up -->
    <circle cx="30" cy="-18" r="4" fill="#F0D0A0"/>
    <rect x="28" y="-22" width="4" height="8" rx="2" fill="#F0D0A0"/>

    <!-- Legs -->
    <rect x="-10" y="20" width="8" height="22" rx="2" fill="#2A2A3E"/>
    <rect x="2" y="20" width="8" height="22" rx="2" fill="#2A2A3E"/>
    <!-- Boots -->
    <rect x="-12" y="40" width="12" height="5" rx="2" fill="#1A1A2E"/>
    <rect x="0" y="40" width="12" height="5" rx="2" fill="#1A1A2E"/>

    <!-- Signal waves from phone -->
    <path d="M-36 3 a6 6 0 0 0 0 8" fill="none" stroke="#06B6D4" stroke-width="0.6" opacity="0.4"/>
    <path d="M-39 1 a9 9 0 0 0 0 12" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.25"/>

    <!-- Stars around (winning!) -->
    <text x="-30" y="-45" font-size="8" fill="#06B6D4" opacity="0.5">&#9733;</text>
    <text x="25" y="-40" font-size="6" fill="#C41E24" opacity="0.4">&#9733;</text>
    <text x="30" y="0" font-size="5" fill="#06B6D4" opacity="0.3">&#9733;</text>
  </g>

  <!-- Title below character -->
  <g transform="translate(85.05, 185)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7" fill="#FFFFFF" text-anchor="middle">DE SLIMME</text>
    <text x="0" y="10" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="7" fill="#06B6D4" text-anchor="middle">INSTALLATEUR</text>
  </g>

  <!-- Pro badge -->
  <g transform="translate(85.05, 210)">
    <rect x="-38" y="-6" width="76" height="14" rx="3" fill="#C41E24"/>
    <text x="0" y="3" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5" fill="#FFFFFF" text-anchor="middle">PRO — 1 JAAR GRATIS</text>
  </g>

  <!-- QR area -->
  <g transform="translate(85.05, 237)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#FFFFFF"/>
    <text x="0" y="-1" font-family="monospace" font-size="3" fill="#0b1220" text-anchor="middle">QR CODE</text>
    <text x="0" y="4" font-family="monospace" font-size="2.2" fill="#888" text-anchor="middle">signaalapp.nl</text>
  </g>
</svg>