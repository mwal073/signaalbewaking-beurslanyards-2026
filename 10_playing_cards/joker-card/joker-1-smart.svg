<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 1: De Slimme Jester — klassieke speelkaart-stijl, SignaalApp branded -->
  <defs>
    <linearGradient id="j1Bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="70%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>
    <radialGradient id="j1Spot" cx="0.5" cy="0.4" r="0.4">
      <stop offset="0%" stop-color="rgba(196,30,36,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="170.1" height="259.8" rx="8" fill="url(#j1Bg)"/>
  <rect width="170.1" height="259.8" rx="8" fill="url(#j1Spot)"/>
  <rect x="0" y="0" width="170.1" height="3" rx="8 8 0 0" fill="#C41E24"/>
  <rect x="0" y="256.8" width="170.1" height="3" rx="0 0 8 8" fill="#C41E24"/>

  <!-- Inner ornamental border -->
  <rect x="8" y="8" width="154.1" height="243.8" rx="4" fill="none" stroke="rgba(196,30,36,0.2)" stroke-width="0.5"/>
  <!-- Corner decorations -->
  <path d="M12 12 L24 12 M12 12 L12 24" fill="none" stroke="rgba(196,30,36,0.25)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M158 12 L146 12 M158 12 L158 24" fill="none" stroke="rgba(196,30,36,0.25)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M12 248 L24 248 M12 248 L12 236" fill="none" stroke="rgba(196,30,36,0.25)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M158 248 L146 248 M158 248 L158 236" fill="none" stroke="rgba(196,30,36,0.25)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Top left: JOKER text -->
  <g transform="translate(14, 14)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12" fill="#C41E24">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="5" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">OKER</text>
    <!-- Small shield -->
    <path d="M2 22 L2 26 Q2 30 6 31 Q10 30 10 26 L10 22 L6 20 L2 22z" fill="#C41E24" stroke="none"/>
    <path d="M4 25 L5.5 26.5 L8.5 23.5" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Bottom right: JOKER text (upside down) -->
  <g transform="translate(156, 246) rotate(180)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12" fill="#C41E24">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="5" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">OKER</text>
    <path d="M2 22 L2 26 Q2 30 6 31 Q10 30 10 26 L10 22 L6 20 L2 22z" fill="#C41E24" stroke="none"/>
    <path d="M4 25 L5.5 26.5 L8.5 23.5" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- ═══════ JESTER CHARACTER ═══════ -->
  <g transform="translate(85, 125)">

    <!-- ── Jester hat (3-pointed with bells) ── -->
    <!-- Main hat base -->
    <path d="M-18-58 Q-16-50 0-48 Q16-50 18-58" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <!-- Left point -->
    <path d="M-18-58 Q-30-72 -35-60 Q-32-55 -28-54" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <!-- Center point -->
    <path d="M-5-48 Q0-78 5-48" fill="#1A1A2E" stroke="#C41E24" stroke-width="0.5"/>
    <!-- Right point -->
    <path d="M18-58 Q30-72 35-60 Q32-55 28-54" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <!-- Bells at tips -->
    <circle cx="-30" cy="-56" r="3" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
    <circle cx="-30" cy="-56" r="1" fill="#FFF8DC"/>
    <circle cx="0" cy="-76" r="3" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
    <circle cx="0" cy="-76" r="1" fill="#FFF8DC"/>
    <circle cx="30" cy="-56" r="3" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
    <circle cx="30" cy="-56" r="1" fill="#FFF8DC"/>
    <!-- Hat band -->
    <path d="M-18-56 Q0-52 18-56" fill="none" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Diamond on hat center -->
    <path d="M0-54 L-3-58 L0-62 L3-58 Z" fill="#06B6D4" stroke="#0891B2" stroke-width="0.3"/>

    <!-- ── Face ── -->
    <ellipse cx="0" cy="-40" rx="15" ry="16" fill="#FAE0C0" stroke="#E8C8A0" stroke-width="0.5"/>
    <!-- Eyes (sly, confident wink) -->
    <ellipse cx="-6" cy="-43" rx="2.5" ry="2.8" fill="#FFFFFF" stroke="#333" stroke-width="0.3"/>
    <circle cx="-5.5" cy="-42.5" r="1.5" fill="#1A1A2E"/>
    <circle cx="-5" cy="-43" r="0.5" fill="#FFFFFF"/>
    <!-- Right eye: wink -->
    <path d="M3-43 Q6-41 9-43" fill="none" stroke="#1A1A2E" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M-1-38 Q0-36 1-38" fill="none" stroke="#D4A080" stroke-width="0.8"/>
    <!-- Confident smirk -->
    <path d="M-7-33 Q-3-29 0-30 Q3-29 7-33" fill="none" stroke="#A0522D" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Dimple -->
    <path d="M8-33 Q9-32 8-31" fill="none" stroke="#D4A080" stroke-width="0.4"/>
    <!-- Cheek blush -->
    <ellipse cx="-10" cy="-36" rx="3" ry="2" fill="#FFB6B6" opacity="0.3"/>
    <ellipse cx="10" cy="-36" rx="3" ry="2" fill="#FFB6B6" opacity="0.3"/>
    <!-- Eyebrows -->
    <path d="M-9-47 Q-6-49 -3-47" fill="none" stroke="#8B6914" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M3-47 Q6-49 9-46" fill="none" stroke="#8B6914" stroke-width="0.7" stroke-linecap="round"/>

    <!-- ── Ruff collar (zig-zag) ── -->
    <path d="M-20-24 L-16-20 L-12-26 L-8-20 L-4-26 L0-20 L4-26 L8-20 L12-26 L16-20 L20-24" fill="none" stroke="#FFD700" stroke-width="1.2"/>
    <path d="M-20-24 L-16-20 L-12-26 L-8-20 L-4-26 L0-20 L4-26 L8-20 L12-26 L16-20 L20-24" fill="rgba(255,215,0,0.1)"/>

    <!-- ── Torso (split color — classic jester) ── -->
    <!-- Left half: red -->
    <path d="M-18-20 L-20 30 Q-20 35 -10 35 L0 35 L0-20 Z" fill="#C41E24" stroke="#8B0000" stroke-width="0.3"/>
    <!-- Right half: dark -->
    <path d="M0-20 L0 35 L10 35 Q20 35 20 30 L18-20 Z" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="0.3"/>
    <!-- Diamond pattern on torso -->
    <path d="M-9-8 L-13-2 L-9 4 L-5-2 Z" fill="none" stroke="#FFD700" stroke-width="0.5"/>
    <path d="M9-8 L5-2 L9 4 L13-2 Z" fill="none" stroke="#C41E24" stroke-width="0.5"/>
    <path d="M-9 10 L-13 16 L-9 22 L-5 16 Z" fill="none" stroke="#FFD700" stroke-width="0.5"/>
    <path d="M9 10 L5 16 L9 22 L13 16 Z" fill="none" stroke="#C41E24" stroke-width="0.5"/>
    <!-- Belt -->
    <rect x="-18" y="14" width="36" height="4" rx="1" fill="#FFD700" stroke="#DAA520" stroke-width="0.3"/>
    <rect x="-3" y="13" width="6" height="6" rx="1" fill="#FFD700" stroke="#DAA520" stroke-width="0.3"/>
    <!-- Shield buckle on belt -->
    <path d="M0 14 L-2 15 L-2 17.5 Q-2 19 0 19.5 Q2 19 2 17.5 L2 15 Z" fill="#06B6D4" stroke="#0891B2" stroke-width="0.3"/>

    <!-- ── Left arm: holding scepter/staff ── -->
    <!-- Upper arm -->
    <path d="M-18-16 Q-28-8 -30 5" fill="none" stroke="#C41E24" stroke-width="6" stroke-linecap="round"/>
    <path d="M-18-16 Q-28-8 -30 5" fill="none" stroke="#8B0000" stroke-width="0.5"/>
    <!-- Forearm -->
    <path d="M-30 5 Q-32 15 -28 22" fill="none" stroke="#C41E24" stroke-width="5" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="-28" cy="22" r="4" fill="#FAE0C0" stroke="#E8C8A0" stroke-width="0.3"/>

    <!-- Scepter/Staff -->
    <line x1="-28" y1="22" x2="-28" y2="-45" stroke="#FFD700" stroke-width="2"/>
    <line x1="-28" y1="22" x2="-28" y2="-45" stroke="#DAA520" stroke-width="0.5"/>
    <!-- Scepter top: Shield with signal waves -->
    <g transform="translate(-28, -52)">
      <path d="M0-8 L-7-4 L-7 3 Q-7 9 0 11 Q7 9 7 3 L7-4 Z" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
      <path d="M-3 0 L-1 2 L4-2" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Signal waves -->
      <path d="M-9-2 a6 6 0 0 0 0 6" fill="none" stroke="#06B6D4" stroke-width="0.6"/>
      <path d="M9-2 a6 6 0 0 1 0 6" fill="none" stroke="#06B6D4" stroke-width="0.6"/>
    </g>

    <!-- ── Right arm: holding phone/card ── -->
    <path d="M18-16 Q28-8 30 0" fill="none" stroke="#1A1A2E" stroke-width="6" stroke-linecap="round"/>
    <path d="M30 0 Q32 10 28 18" fill="none" stroke="#1A1A2E" stroke-width="5" stroke-linecap="round"/>
    <circle cx="28" cy="18" r="4" fill="#FAE0C0" stroke="#E8C8A0" stroke-width="0.3"/>
    <!-- Playing card (ace) in hand -->
    <g transform="translate(34, 5) rotate(15)">
      <rect x="-6" y="-9" width="12" height="17" rx="1.5" fill="#FFFFFF" stroke="#DDD" stroke-width="0.3"/>
      <!-- Mini shield on card -->
      <path d="M0-4 L-3-2 L-3 1 Q-3 4 0 5 Q3 4 3 1 L3-2 Z" fill="#C41E24"/>
      <path d="M-1.5 0 L-0.5 1 L2-1" fill="none" stroke="#FFF" stroke-width="0.7" stroke-linecap="round"/>
      <text x="0" y="-5.5" font-family="Georgia, serif" font-size="3.5" fill="#C41E24" text-anchor="middle" font-weight="700">A</text>
    </g>

    <!-- ── Legs ── -->
    <!-- Left leg (red) -->
    <path d="M-8 35 L-12 60" fill="none" stroke="#C41E24" stroke-width="7" stroke-linecap="round"/>
    <!-- Right leg (dark) -->
    <path d="M8 35 L12 60" fill="none" stroke="#1A1A2E" stroke-width="7" stroke-linecap="round"/>
    <!-- Jester shoes (curled toes) -->
    <path d="M-16 58 Q-18 62 -12 63 Q-6 64 -4 60 Q-2 56 -8 56" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <circle cx="-4" cy="60" r="2" fill="#FFD700" stroke="#DAA520" stroke-width="0.3"/>
    <path d="M8 58 Q6 62 12 63 Q18 64 20 60 Q22 56 16 56" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="0.5"/>
    <circle cx="20" cy="60" r="2" fill="#FFD700" stroke="#DAA520" stroke-width="0.3"/>
  </g>

  <!-- ── Bottom text ── -->
  <g transform="translate(85, 205)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="6.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">DE SLIMME ZET</text>
  </g>

  <!-- Pro badge -->
  <g transform="translate(85, 220)">
    <rect x="-40" y="-6" width="80" height="14" rx="3" fill="#C41E24"/>
    <text x="0" y="2.5" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="5" fill="#FFFFFF" text-anchor="middle">PRO — 1 JAAR GRATIS</text>
  </g>

  <!-- QR + signaalapp.nl -->
  <g transform="translate(85, 243)">
    <rect x="-10" y="-7" width="20" height="14" rx="2" fill="#FFFFFF"/>
    <text x="0" y="-0.5" font-family="monospace" font-size="3" fill="#0b1220" text-anchor="middle">QR</text>
    <text x="0" y="4" font-family="monospace" font-size="2" fill="#888" text-anchor="middle">signaalapp.nl</text>
  </g>
</svg>