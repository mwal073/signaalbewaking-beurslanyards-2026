<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 1: Colored Jester — white bg, traditional proportions -->

  <rect width="170.1" height="259.8" rx="8" fill="#FFFFFF"/>
  <rect x="5" y="5" width="160.1" height="249.8" rx="5" fill="none" stroke="#CC0000" stroke-width="0.3"/>

  <!-- Top-left JOKER (vertical) -->
  <g transform="translate(13, 16)">
    <text x="0" y="9" font-family="Georgia, serif" font-weight="700" font-size="10" fill="#CC0000">J</text>
    <text x="0" y="18" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">O</text>
    <text x="0" y="26" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">K</text>
    <text x="0" y="34" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">E</text>
    <text x="0" y="42" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">R</text>
    <!-- Small star -->
    <text x="3" y="52" font-family="serif" font-size="7" fill="#CC0000">&#9733;</text>
  </g>

  <!-- Bottom-right JOKER (rotated) -->
  <g transform="translate(157, 244) rotate(180)">
    <text x="0" y="9" font-family="Georgia, serif" font-weight="700" font-size="10" fill="#CC0000">J</text>
    <text x="0" y="18" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">O</text>
    <text x="0" y="26" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">K</text>
    <text x="0" y="34" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">E</text>
    <text x="0" y="42" font-family="Georgia, serif" font-size="6.5" fill="#CC0000">R</text>
    <text x="3" y="52" font-family="serif" font-size="7" fill="#CC0000">&#9733;</text>
  </g>

  <!-- ═══════ JESTER — centered, fills card vertically ═══════ -->
  <!-- Figure from y=22 to y=238 = 216 units tall -->
  <g transform="translate(85, 0)">

    <!-- ── HAT (3 points with bells) y=22..62 ── -->
    <!-- Left point -->
    <path d="M-12 62 Q-18 52 -8 48 Q-22 38 -28 28 Q-34 38 -30 44" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <circle cx="-30" cy="44" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="-30" cy="44" r="1" fill="#FFF8DC"/>
    <!-- Center point -->
    <path d="M-8 48 Q0 22 8 48" fill="#1B3A6B" stroke="#15305A" stroke-width="0.5"/>
    <circle cx="0" cy="22" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="0" cy="22" r="1" fill="#FFF8DC"/>
    <!-- Right point -->
    <path d="M8 48 Q18 52 12 62" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <path d="M8 48 Q22 38 28 28 Q34 38 30 44" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <circle cx="30" cy="44" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="30" cy="44" r="1" fill="#FFF8DC"/>
    <!-- Hat band -->
    <path d="M-12 60 Q0 55 12 60" fill="none" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Hat jewel -->
    <path d="M0 42 L-2.5 46 L0 50 L2.5 46 Z" fill="#06B6D4" stroke="#0891B2" stroke-width="0.3"/>

    <!-- ── FACE y=58..92 ── -->
    <ellipse cx="0" cy="76" rx="14" ry="16" fill="#FAEBD7" stroke="#C9A96E" stroke-width="0.5"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="72" rx="2.5" ry="2.8" fill="#FFF" stroke="#333" stroke-width="0.35"/>
    <circle cx="-4.5" cy="71.5" r="1.5" fill="#1A1A2E"/>
    <circle cx="-4" cy="71" r="0.5" fill="#FFF"/>
    <!-- Right eye: wink -->
    <path d="M3 72 Q5.5 70 8 72" fill="none" stroke="#1A1A2E" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Eyebrows -->
    <path d="M-8 68 Q-5 66 -2 68" fill="none" stroke="#5C3317" stroke-width="0.6" stroke-linecap="round"/>
    <path d="M3 68 Q5.5 66 8.5 67" fill="none" stroke="#5C3317" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M-1 78 Q0 80 1 78" fill="none" stroke="#C4956A" stroke-width="0.6"/>
    <!-- Smirk -->
    <path d="M-6 83 Q-2 87 0 86 Q2 87 6 83" fill="none" stroke="#8B4513" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Cheeks -->
    <ellipse cx="-9" cy="80" rx="3" ry="1.5" fill="#FFB6B6" opacity="0.3"/>
    <ellipse cx="9" cy="80" rx="3" ry="1.5" fill="#FFB6B6" opacity="0.3"/>

    <!-- ── RUFF COLLAR y=90..97 ── -->
    <path d="M-18 94 L-14 90 L-10 96 L-6 90 L-2 96 L2 90 L6 96 L10 90 L14 96 L18 90 L22 94"
      fill="rgba(255,215,0,0.12)" stroke="#DAA520" stroke-width="0.8"/>

    <!-- ── TORSO (split costume) y=94..160 ── -->
    <!-- Left: red -->
    <path d="M-16 94 L-18 156 Q-18 162 -8 162 L0 162 L0 94 Z" fill="#C41E24" stroke="#8B0000" stroke-width="0.3"/>
    <!-- Right: blue -->
    <path d="M0 94 L0 162 L8 162 Q18 162 18 156 L16 94 Z" fill="#1B3A6B" stroke="#15305A" stroke-width="0.3"/>
    <!-- Diamonds on torso -->
    <path d="M-8 108 L-11 114 L-8 120 L-5 114 Z" fill="none" stroke="#FFD700" stroke-width="0.5"/>
    <path d="M8 108 L5 114 L8 120 L11 114 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
    <path d="M-8 130 L-11 136 L-8 142 L-5 136 Z" fill="none" stroke="#FFD700" stroke-width="0.5"/>
    <path d="M8 130 L5 136 L8 142 L11 136 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
    <!-- Belt -->
    <rect x="-16" y="148" width="32" height="4" rx="1" fill="#FFD700" stroke="#B8860B" stroke-width="0.3"/>
    <rect x="-3" y="147" width="6" height="6" rx="1" fill="#FFD700" stroke="#B8860B" stroke-width="0.3"/>

    <!-- ── LEFT ARM + SCEPTER ── -->
    <path d="M-16 100 Q-26 110 -28 124" fill="none" stroke="#C41E24" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M-28 124 Q-30 136 -26 146" fill="none" stroke="#C41E24" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="-26" cy="146" r="3.5" fill="#FAEBD7" stroke="#C9A96E" stroke-width="0.3"/>
    <!-- Scepter shaft -->
    <line x1="-26" y1="146" x2="-26" y2="52" stroke="#B8860B" stroke-width="2"/>
    <line x1="-26" y1="146" x2="-26" y2="52" stroke="#FFD700" stroke-width="1"/>
    <!-- Scepter top: star in circle -->
    <circle cx="-26" cy="46" r="5.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <path d="M-26 41 L-24.5 44 L-21 44.5 L-23.5 47 L-23 50.5 L-26 49 L-29 50.5 L-28.5 47 L-31 44.5 L-27.5 44 Z" fill="#C41E24" stroke="#8B0000" stroke-width="0.2"/>

    <!-- ── RIGHT ARM + CARD ── -->
    <path d="M16 100 Q26 108 28 118" fill="none" stroke="#1B3A6B" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M28 118 Q30 130 26 140" fill="none" stroke="#1B3A6B" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="26" cy="140" r="3.5" fill="#FAEBD7" stroke="#C9A96E" stroke-width="0.3"/>
    <!-- Playing card -->
    <g transform="translate(33, 126) rotate(12)">
      <rect x="-6" y="-8.5" width="12" height="17" rx="1.2" fill="#FFF" stroke="#444" stroke-width="0.35"/>
      <text x="0" y="-2" font-family="Georgia, serif" font-size="4.5" fill="#000" text-anchor="middle" font-weight="700">A</text>
      <text x="0" y="5.5" font-family="serif" font-size="7" fill="#000" text-anchor="middle">&#9824;</text>
    </g>

    <!-- ── LEGS y=160..210 ── -->
    <path d="M-7 162 L-11 204" fill="none" stroke="#C41E24" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M7 162 L11 204" fill="none" stroke="#1B3A6B" stroke-width="6.5" stroke-linecap="round"/>

    <!-- ── SHOES (curled toes) y=202..216 ── -->
    <path d="M-15 202 Q-17 208 -11 210 Q-5 211 -3 207 Q-1 203 -7 202" fill="#C41E24" stroke="#8B0000" stroke-width="0.4"/>
    <circle cx="-3" cy="207" r="2" fill="#FFD700" stroke="#B8860B" stroke-width="0.3"/>
    <path d="M7 202 Q5 208 11 210 Q17 211 19 207 Q21 203 15 202" fill="#1B3A6B" stroke="#15305A" stroke-width="0.4"/>
    <circle cx="19" cy="207" r="2" fill="#FFD700" stroke="#B8860B" stroke-width="0.3"/>
  </g>

  <!-- Bottom center star -->
  <text x="85" y="248" font-family="serif" font-size="5" fill="#CC0000" text-anchor="middle">&#9733;</text>
</svg>
