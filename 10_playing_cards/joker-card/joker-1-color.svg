<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 259.8" width="170.1" height="259.8">
  <!-- JOKER 1: Colored Jester — traditional playing card style, white background -->

  <!-- White card background -->
  <rect width="170.1" height="259.8" rx="8" fill="#FFFFFF"/>
  <rect x="5" y="5" width="160.1" height="249.8" rx="5" fill="none" stroke="#CC0000" stroke-width="0.4"/>

  <!-- Top left: JOKER -->
  <g transform="translate(12, 14)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="11" fill="#CC0000">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">O</text>
    <text x="0" y="27" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">K</text>
    <text x="0" y="35" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">E</text>
    <text x="0" y="43" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">R</text>
  </g>

  <!-- Bottom right: JOKER (upside down) -->
  <g transform="translate(159, 246) rotate(180)">
    <text x="0" y="10" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="11" fill="#CC0000">J</text>
    <text x="0" y="19" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">O</text>
    <text x="0" y="27" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">K</text>
    <text x="0" y="35" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">E</text>
    <text x="0" y="43" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7" fill="#CC0000" letter-spacing="0.3">R</text>
  </g>

  <!-- ═══════ COLORED JESTER (traditional style, branded colors) ═══════ -->
  <g transform="translate(85, 128)">

    <!-- ── Jester hat (3-pointed, red/blue branded) ── -->
    <!-- Main hat base -->
    <path d="M-20-58 Q-18-50 0-48 Q18-50 20-58" fill="#C41E24" stroke="#8B0000" stroke-width="0.6"/>
    <!-- Left point (red) -->
    <path d="M-20-58 Q-32-75 -38-62 Q-35-56 -30-55" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <!-- Center point (blue — Schipper Security) -->
    <path d="M-6-48 Q0-82 6-48" fill="#1B3A6B" stroke="#2A5298" stroke-width="0.5"/>
    <!-- Right point (red) -->
    <path d="M20-58 Q32-75 38-62 Q35-56 30-55" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <!-- Golden bells at tips -->
    <circle cx="-33" cy="-58" r="3.5" fill="#FFD700" stroke="#DAA520" stroke-width="0.6"/>
    <circle cx="-33" cy="-58" r="1.2" fill="#FFF8DC"/>
    <circle cx="0" cy="-80" r="3.5" fill="#FFD700" stroke="#DAA520" stroke-width="0.6"/>
    <circle cx="0" cy="-80" r="1.2" fill="#FFF8DC"/>
    <circle cx="33" cy="-58" r="3.5" fill="#FFD700" stroke="#DAA520" stroke-width="0.6"/>
    <circle cx="33" cy="-58" r="1.2" fill="#FFF8DC"/>
    <!-- Hat band -->
    <path d="M-20-56 Q0-52 20-56" fill="none" stroke="#FFD700" stroke-width="1.8"/>
    <!-- Diamond jewel on center -->
    <path d="M0-55 L-3-59 L0-63 L3-59 Z" fill="#06B6D4" stroke="#0891B2" stroke-width="0.4"/>

    <!-- ── Face ── -->
    <ellipse cx="0" cy="-38" rx="16" ry="17" fill="#FAEBD7" stroke="#D4A574" stroke-width="0.6"/>
    <!-- Left eye (open, confident) -->
    <ellipse cx="-6" cy="-42" rx="3" ry="3.2" fill="#FFFFFF" stroke="#333" stroke-width="0.4"/>
    <circle cx="-5.5" cy="-41.5" r="1.8" fill="#1A1A2E"/>
    <circle cx="-5" cy="-42" r="0.6" fill="#FFFFFF"/>
    <!-- Right eye (winking) -->
    <path d="M3-42 Q6.5-39.5 10-42" fill="none" stroke="#1A1A2E" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Eyebrows -->
    <path d="M-10-47 Q-6-49 -3-47" fill="none" stroke="#5C3317" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M3-47 Q6-49 10-46" fill="none" stroke="#5C3317" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M-1.5-36 Q0-33.5 1.5-36" fill="none" stroke="#C4956A" stroke-width="0.8"/>
    <!-- Confident grin -->
    <path d="M-8-30 Q-4-25 0-27 Q4-25 8-30" fill="#CC0000" stroke="#8B0000" stroke-width="0.4"/>
    <path d="M-6-29 Q0-25.5 6-29" fill="#FFFFFF" stroke="none"/>
    <!-- Cheek blush -->
    <ellipse cx="-11" cy="-34" rx="3.5" ry="2" fill="#FFB6B6" opacity="0.35"/>
    <ellipse cx="11" cy="-34" rx="3.5" ry="2" fill="#FFB6B6" opacity="0.35"/>

    <!-- ── Ruff collar (golden zig-zag) ── -->
    <path d="M-22-20 L-18-15 L-13-22 L-9-15 L-4-22 L0-15 L4-22 L9-15 L13-22 L18-15 L22-20" fill="rgba(255,215,0,0.15)" stroke="#DAA520" stroke-width="1.2"/>
    <path d="M-22-20 L-18-15 L-13-22 L-9-15 L-4-22 L0-15 L4-22 L9-15 L13-22 L18-15 L22-20" fill="none" stroke="#FFD700" stroke-width="0.6"/>

    <!-- ── Torso (split: left red, right blue) ── -->
    <path d="M-20-16 L-22 32 Q-22 38 -12 38 L0 38 L0-16 Z" fill="#C41E24" stroke="#8B0000" stroke-width="0.4"/>
    <path d="M0-16 L0 38 L12 38 Q22 38 22 32 L20-16 Z" fill="#1B3A6B" stroke="#15305A" stroke-width="0.4"/>
    <!-- Diamond patterns on torso -->
    <path d="M-10-4 L-14 2 L-10 8 L-6 2 Z" fill="none" stroke="#FFD700" stroke-width="0.6"/>
    <path d="M10-4 L6 2 L10 8 L14 2 Z" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5"/>
    <path d="M-10 14 L-14 20 L-10 26 L-6 20 Z" fill="none" stroke="#FFD700" stroke-width="0.6"/>
    <path d="M10 14 L6 20 L10 26 L14 20 Z" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5"/>
    <!-- Golden belt -->
    <rect x="-20" y="16" width="40" height="4.5" rx="1" fill="#FFD700" stroke="#DAA520" stroke-width="0.4"/>
    <rect x="-3.5" y="15" width="7" height="6.5" rx="1.5" fill="#FFD700" stroke="#DAA520" stroke-width="0.4"/>

    <!-- ── Left arm + scepter ── -->
    <path d="M-20-12 Q-30-4 -32 8" fill="none" stroke="#C41E24" stroke-width="7" stroke-linecap="round"/>
    <path d="M-32 8 Q-34 18 -30 25" fill="none" stroke="#C41E24" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-30" cy="25" r="4.5" fill="#FAEBD7" stroke="#D4A574" stroke-width="0.4"/>
    <!-- Scepter -->
    <line x1="-30" y1="25" x2="-30" y2="-48" stroke="#DAA520" stroke-width="2.5"/>
    <line x1="-30" y1="25" x2="-30" y2="-48" stroke="#FFD700" stroke-width="1.2"/>
    <!-- Scepter top: crown/star -->
    <g transform="translate(-30, -54)">
      <circle cx="0" cy="0" r="6" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
      <path d="M0-5 L1.5-2 L5-1.5 L2.5 1 L3 4.5 L0 3 L-3 4.5 L-2.5 1 L-5-1.5 L-1.5-2 Z" fill="#C41E24" stroke="#8B0000" stroke-width="0.3"/>
    </g>

    <!-- ── Right arm + playing card ── -->
    <path d="M20-12 Q30-4 32 4" fill="none" stroke="#1B3A6B" stroke-width="7" stroke-linecap="round"/>
    <path d="M32 4 Q34 14 30 22" fill="none" stroke="#1B3A6B" stroke-width="6" stroke-linecap="round"/>
    <circle cx="30" cy="22" r="4.5" fill="#FAEBD7" stroke="#D4A574" stroke-width="0.4"/>
    <!-- Playing card in hand (ace of spades) -->
    <g transform="translate(37, 8) rotate(12)">
      <rect x="-7" y="-10" width="14" height="19" rx="1.5" fill="#FFFFFF" stroke="#333" stroke-width="0.4"/>
      <text x="0" y="-3" font-family="Georgia, serif" font-size="5" fill="#000" text-anchor="middle" font-weight="700">A</text>
      <text x="0" y="5" font-family="serif" font-size="8" fill="#000" text-anchor="middle">&#9824;</text>
    </g>

    <!-- ── Legs ── -->
    <path d="M-9 38 L-13 65" fill="none" stroke="#C41E24" stroke-width="8" stroke-linecap="round"/>
    <path d="M9 38 L13 65" fill="none" stroke="#1B3A6B" stroke-width="8" stroke-linecap="round"/>
    <!-- Curled jester shoes -->
    <path d="M-18 62 Q-20 67 -13 68 Q-6 69 -4 65 Q-2 61 -9 61" fill="#C41E24" stroke="#8B0000" stroke-width="0.5"/>
    <circle cx="-4" cy="65" r="2.2" fill="#FFD700" stroke="#DAA520" stroke-width="0.4"/>
    <path d="M9 62 Q7 67 13 68 Q20 69 22 65 Q24 61 17 61" fill="#1B3A6B" stroke="#15305A" stroke-width="0.5"/>
    <circle cx="22" cy="65" r="2.2" fill="#FFD700" stroke="#DAA520" stroke-width="0.4"/>
  </g>

  <!-- Small star decorations in corners -->
  <text x="85" y="250" font-family="serif" font-size="6" fill="#CC0000" text-anchor="middle">&#9733;</text>
</svg>
