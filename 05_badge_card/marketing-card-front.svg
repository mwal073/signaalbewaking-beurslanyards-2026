<?xml version="1.0" encoding="UTF-8"?>
<!-- Marketing Card FRONT — 90 x 130mm + 3mm bleed = 96 x 136mm -->
<!-- Signaal Rood #C41E24 background, white text -->
<!-- 350gsm matte, soft touch laminate -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="96mm" height="136mm"
     viewBox="0 0 362.83 514.02">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
    </style>
  </defs>

  <!-- Full bleed background -->
  <rect width="362.83" height="514.02" fill="#C41E24"/>

  <!-- Crop marks (3mm = 11.34pt offset, 5mm = 18.90pt length) -->
  <g stroke="#000000" stroke-width="0.25" fill="none">
    <!-- Top-left -->
    <line x1="0" y1="11.34" x2="8" y2="11.34"/>
    <line x1="11.34" y1="0" x2="11.34" y2="8"/>
    <!-- Top-right -->
    <line x1="354.83" y1="11.34" x2="362.83" y2="11.34"/>
    <line x1="351.49" y1="0" x2="351.49" y2="8"/>
    <!-- Bottom-left -->
    <line x1="0" y1="502.68" x2="8" y2="502.68"/>
    <line x1="11.34" y1="506.02" x2="11.34" y2="514.02"/>
    <!-- Bottom-right -->
    <line x1="354.83" y1="502.68" x2="362.83" y2="502.68"/>
    <line x1="351.49" y1="506.02" x2="351.49" y2="514.02"/>
  </g>

  <!-- Safe area starts at 3mm bleed + 5mm margin = 8mm = 30.24pt from edge -->
  <!-- Trim area: 11.34pt to 351.49pt (x), 11.34pt to 502.68pt (y) -->

  <!-- Headline text — left aligned, 12mm from left trim = 11.34 + 45.35 = 56.69pt -->
  <text font-family="Montserrat, sans-serif" font-weight="800" fill="#FFFFFF" letter-spacing="1">
    <tspan x="56.69" y="175" font-size="26">WIJ BEVEILIGEN</tspan>
    <tspan x="56.69" y="210" font-size="26">NIET ALLEEN</tspan>
    <tspan x="56.69" y="245" font-size="26">JE KLANTEN,</tspan>
    <tspan x="56.69" y="280" font-size="26">MAAR OOK</tspan>
    <tspan x="56.69" y="315" font-size="26">JE TELEFOON.</tspan>
  </text>

  <!-- "Graag gedaan." — bottom right, subtle -->
  <text x="320" y="475"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="10"
        fill="#FFFFFF"
        text-anchor="end"
        opacity="0.55"
        letter-spacing="0.3">
    Graag gedaan.
  </text>

  <!-- SignaalBewaking.nl — bottom left, small -->
  <text x="56.69" y="475"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="8"
        fill="#FFFFFF"
        opacity="0.7"
        letter-spacing="0.5">
    SignaalBewaking.nl
  </text>
</svg>
