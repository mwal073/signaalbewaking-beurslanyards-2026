<?xml version="1.0" encoding="UTF-8"?>
<!-- Marketing Card BACK — 90 x 130mm + 3mm bleed = 96 x 136mm -->
<!-- White background, Donkergrijs text, Signaal Rood accents -->
<!-- 350gsm matte, soft touch laminate -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="96mm" height="136mm"
     viewBox="0 0 362.83 514.02">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
    </style>
  </defs>

  <!-- Full bleed background -->
  <rect width="362.83" height="514.02" fill="#FFFFFF"/>

  <!-- Crop marks (3mm = 11.34pt offset) -->
  <g stroke="#000000" stroke-width="0.25" fill="none">
    <!-- Top-left -->
    <line x1="0" y1="11.34" x2="8" y2="11.34"/>
    <line x1="11.34" y1="0" x2="11.34" y2="8"/>
    <!-- Top-right -->
    <line x1="354.83" y1="11.34" x2="362.83" y2="11.34"/>
    <line x1="351.49" y1="0" x2="351.49" y2="8"/>
    <!-- Bottom-left -->
    <line x1="0" y1="502.68" x2="8" y2="502.68"/>
    <line x1="11.34" y1="506.02" x2="11.34" y2="514.02"/>
    <!-- Bottom-right -->
    <line x1="354.83" y1="502.68" x2="362.83" y2="502.68"/>
    <line x1="351.49" y1="506.02" x2="351.49" y2="514.02"/>
  </g>

  <!-- Safe area: 8mm from trim = 30.24pt from edge of bleed -->
  <!-- Trim: 11.34 to 351.49 (x), 11.34 to 502.68 (y) -->
  <!-- Content area: ~56.69 to ~306 (x), ~42 to ~472 (y) -->

  <!-- Thin red accent line at top -->
  <rect x="11.34" y="11.34" width="340.15" height="3" fill="#C41E24"/>

  <!-- Headline: "Tijd om ook je omzet te beveiligen." -->
  <text x="56.69" y="75"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="18"
        fill="#C41E24"
        letter-spacing="0.3">
    Tijd om ook je omzet
  </text>
  <text x="56.69" y="98"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="18"
        fill="#C41E24"
        letter-spacing="0.3">
    te beveiligen.
  </text>

  <!-- Body copy block 1 -->
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="9" fill="#333333" letter-spacing="0.2">
    <tspan x="56.69" y="135">Met </tspan>
  </text>
  <text x="75.5" y="135"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="9"
        fill="#C41E24"
        letter-spacing="0.2">Veiligheidskeuze.nl</text>
  <text x="178" y="135"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="9"
        fill="#333333"
        letter-spacing="0.2"> bied jij je</text>
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="9" fill="#333333" letter-spacing="0.2">
    <tspan x="56.69" y="150">klanten het allerbeste advies.</tspan>
  </text>

  <!-- Body copy block 2 -->
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="9" fill="#333333" letter-spacing="0.2">
    <tspan x="56.69" y="175">Met </tspan>
  </text>
  <text x="75.5" y="175"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="9"
        fill="#C41E24"
        letter-spacing="0.2">SignaalApp.nl</text>
  <text x="145" y="175"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="9"
        fill="#333333"
        letter-spacing="0.2"> heb je offertes</text>
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="9" fill="#333333" letter-spacing="0.2">
    <tspan x="56.69" y="190">sneller de deur uit dan ooit.</tspan>
  </text>

  <!-- Tagline -->
  <text x="56.69" y="225"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="9.5"
        fill="#333333"
        letter-spacing="0.3"
        font-style="italic">
    Minder kantoor, meer klussen.
  </text>

  <!-- Separator line -->
  <line x1="56.69" y1="245" x2="180" y2="245" stroke="#C41E24" stroke-width="1.5"/>

  <!-- CTA -->
  <text x="56.69" y="272"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="11"
        fill="#333333"
        letter-spacing="0.3">
    Scan en sluit je aan bij
  </text>
  <text x="56.69" y="289"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="11"
        fill="#333333"
        letter-spacing="0.3">
    de slimste club van Nederland.
  </text>

  <!-- QR Code placeholder (large, right-bottom area) -->
  <rect x="220" y="320" width="100" height="100" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.5" rx="4"/>
  <text x="270" y="375"
        font-family="Montserrat, sans-serif"
        font-weight="600"
        font-size="8"
        fill="#888888"
        text-anchor="middle">QR</text>
  <text x="270" y="435"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="7"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="0.3">
    signaalbewaking.nl/fss
  </text>

  <!-- SignaalBewaking shield logo — small, bottom left -->
  <g transform="translate(56.69, 390)">
    <path d="M10 0 L20 4 L20 12 C20 17.5 15.2 21.5 10 24 C4.8 21.5 0 17.5 0 12 L0 4 Z"
          fill="#C41E24" stroke="none"/>
    <g transform="translate(5.2, 6.4) scale(0.4)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
      <path stroke-linecap="round" d="M9.348 14.652a3.75 3.75 0 010-5.304m5.304 0a3.75 3.75 0 010 5.304m-7.425 2.121a6.75 6.75 0 010-9.546m9.546 0a6.75 6.75 0 010 9.546"/>
    </g>
  </g>

  <!-- Brand name next to logo -->
  <text x="84" y="403"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="8.5"
        fill="#333333"
        letter-spacing="0.5">
    SIGNAALBEWAKING
  </text>
  <text x="84" y="414"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="6.5"
        fill="#888888"
        letter-spacing="0.3">
    Powered by SignaalApp
  </text>

  <!-- Contact info bottom -->
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="6" fill="#888888" letter-spacing="0.3">
    <tspan x="56.69" y="455">info@signaalbewaking.nl</tspan>
    <tspan x="56.69" y="466">signaalbewaking.nl</tspan>
  </text>

  <!-- Thin red accent line at bottom -->
  <rect x="11.34" y="499.68" width="340.15" height="3" fill="#C41E24"/>

</svg>
