<?xml version="1.0" encoding="UTF-8"?>
<!-- Marketing Card BACK — 90 x 130mm + 3mm bleed = 96 x 136mm -->
<!-- White background, Donkergrijs text, Signaal Rood accents -->
<!-- 350gsm matte, soft touch laminate -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="96mm" height="136mm"
     viewBox="0 0 362.83 514.02">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Full bleed background -->
  <rect width="362.83" height="514.02" fill="#FFFFFF"/>

  <!-- Crop marks -->
  <g stroke="#000000" stroke-width="0.25" fill="none">
    <line x1="0" y1="11.34" x2="8" y2="11.34"/>
    <line x1="11.34" y1="0" x2="11.34" y2="8"/>
    <line x1="354.83" y1="11.34" x2="362.83" y2="11.34"/>
    <line x1="351.49" y1="0" x2="351.49" y2="8"/>
    <line x1="0" y1="502.68" x2="8" y2="502.68"/>
    <line x1="11.34" y1="506.02" x2="11.34" y2="514.02"/>
    <line x1="354.83" y1="502.68" x2="362.83" y2="502.68"/>
    <line x1="351.49" y1="506.02" x2="351.49" y2="514.02"/>
  </g>

  <!-- Red accent line top -->
  <rect x="11.34" y="11.34" width="340.15" height="3" fill="#C41E24"/>

  <!-- === TOP: Real logo (color variant) left-aligned === -->
  <g transform="translate(40, 30) scale(1.2)">
    <path d="M8 8C8 8 24 4 24 4C24 4 40 8 40 8C40 8 40 26 40 26C40 36 24 44 24 44C24 44 8 36 8 26V8Z"
          fill="#D00A2B"/>
    <path d="M20 22L24 26L32 16" stroke="#FFFFFF" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text font-family="Roboto, sans-serif" font-weight="700">
    <tspan x="98" y="52" font-size="14" fill="#1b2b5f">Signaal</tspan>
    <tspan x="98" y="68" font-size="14" fill="#D00A2B">Bewaking</tspan>
  </text>

  <!-- === HEADLINE === -->
  <text x="56.69" y="110"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="20"
        fill="#C41E24"
        letter-spacing="0.3">
    Minder kantoor,
  </text>
  <text x="56.69" y="134"
        font-family="Montserrat, sans-serif"
        font-weight="800"
        font-size="20"
        fill="#C41E24"
        letter-spacing="0.3">
    meer klussen.
  </text>

  <!-- === 3 USP ROWS with shield icons === -->

  <!-- USP 1: 24/7 Meldkamer -->
  <g transform="translate(56.69, 160)">
    <g transform="scale(0.4)">
      <path d="M8 8C8 8 24 4 24 4C24 4 40 8 40 8C40 8 40 26 40 26C40 36 24 44 24 44C24 44 8 36 8 26V8Z" fill="#D00A2B"/>
      <path d="M20 22L24 26L32 16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  <text x="80" y="172" font-family="Montserrat, sans-serif" font-weight="800" font-size="9" fill="#333333" letter-spacing="0.3">24/7 Meldkamer</text>
  <text x="80" y="184" font-family="Montserrat, sans-serif" font-weight="400" font-size="7.5" fill="#666666" letter-spacing="0.2">Alarmverwerking in &lt;30 seconden</text>

  <!-- USP 2: 1.000+ installateurs -->
  <g transform="translate(56.69, 202)">
    <g transform="scale(0.4)">
      <path d="M8 8C8 8 24 4 24 4C24 4 40 8 40 8C40 8 40 26 40 26C40 36 24 44 24 44C24 44 8 36 8 26V8Z" fill="#D00A2B"/>
      <path d="M20 22L24 26L32 16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  <text x="80" y="214" font-family="Montserrat, sans-serif" font-weight="800" font-size="9" fill="#333333" letter-spacing="0.3">1.000+ installateurs</text>
  <text x="80" y="226" font-family="Montserrat, sans-serif" font-weight="400" font-size="7.5" fill="#666666" letter-spacing="0.2">Uw partner</text>

  <!-- USP 3: Gratis offerte-widget -->
  <g transform="translate(56.69, 244)">
    <g transform="scale(0.4)">
      <path d="M8 8C8 8 24 4 24 4C24 4 40 8 40 8C40 8 40 26 40 26C40 36 24 44 24 44C24 44 8 36 8 26V8Z" fill="#D00A2B"/>
      <path d="M20 22L24 26L32 16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  <text x="80" y="256" font-family="Montserrat, sans-serif" font-weight="800" font-size="9" fill="#333333" letter-spacing="0.3">Gratis offerte-widget</text>
  <text x="80" y="268" font-family="Montserrat, sans-serif" font-weight="400" font-size="7.5" fill="#666666" letter-spacing="0.2">Direct op uw website, in uw huisstijl</text>

  <!-- === SEPARATOR === -->
  <line x1="56.69" y1="290" x2="180" y2="290" stroke="#C41E24" stroke-width="1.5"/>

  <!-- === CTA + QR ZONE === -->
  <text font-family="Montserrat, sans-serif" font-weight="800" font-size="10" fill="#333333" letter-spacing="0.2">
    <tspan x="56.69" y="318">Scan de QR en ontdek</tspan>
    <tspan x="56.69" y="332">wat wij voor u</tspan>
    <tspan x="56.69" y="346">kunnen betekenen.</tspan>
  </text>

  <!-- QR Code placeholder (real QR to be inserted for production) -->
  <rect x="240" y="296" width="80" height="80" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5" rx="4"/>
  <!-- QR inner pattern placeholder -->
  <g transform="translate(248, 304)">
    <rect width="64" height="64" fill="#FFFFFF"/>
    <!-- Simplified QR pattern suggesting a real QR code -->
    <rect x="0" y="0" width="18" height="18" fill="#333333"/>
    <rect x="46" y="0" width="18" height="18" fill="#333333"/>
    <rect x="0" y="46" width="18" height="18" fill="#333333"/>
    <rect x="3" y="3" width="12" height="12" fill="#FFFFFF"/>
    <rect x="49" y="3" width="12" height="12" fill="#FFFFFF"/>
    <rect x="3" y="49" width="12" height="12" fill="#FFFFFF"/>
    <rect x="6" y="6" width="6" height="6" fill="#333333"/>
    <rect x="52" y="6" width="6" height="6" fill="#333333"/>
    <rect x="6" y="52" width="6" height="6" fill="#333333"/>
    <!-- Center data area -->
    <rect x="22" y="22" width="20" height="20" fill="#333333" opacity="0.15" rx="2"/>
    <text x="32" y="35" font-family="Montserrat, sans-serif" font-weight="800" font-size="6" fill="#C41E24" text-anchor="middle">SB</text>
  </g>

  <!-- URL under QR -->
  <text x="280" y="392"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="5.5"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="0.3">
    signaalbewaking.nl/fss
  </text>

  <!-- === CERT STRIP bottom === -->
  <text x="56.69" y="435"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="5.5"
        fill="#999999"
        letter-spacing="0.3">
    Kiwa PAC00157 · ISO 9001 · ISO 27001 · EN 50518 · VEB
  </text>

  <!-- Powered by -->
  <text x="56.69" y="455"
        font-family="Montserrat, sans-serif"
        font-weight="400"
        font-size="5"
        fill="#BBBBBB"
        letter-spacing="0.3">
    Powered by SignaalApp
  </text>

  <!-- Red accent line bottom -->
  <rect x="11.34" y="499.68" width="340.15" height="3" fill="#C41E24"/>

</svg>
